<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공진후원 | ON-FORUM</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>

<style>
:root {
  --bg-main:#f7f6f2;
  --deep-blue:#1a2a40;
  --gold:#b5945d;
  --text:#1a1a1a;
  --sub:#666;
}

body {
  font-family:'Pretendard',sans-serif;
  margin:0;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 30%, rgba(181,148,93,0.08), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(26,42,64,0.05), transparent 40%),
    var(--bg-main);
}

.container{
  max-width:900px;
  margin:auto;
  padding:60px 20px;
}
</style>

</head>

<body>
<div class="container">

  <div style="text-align:center; margin-top:40px;">

    <h1 style="color:var(--deep-blue); margin-bottom:25px;">
      공진후원

    <p style="font-size:1.15rem; line-height:2; max-width:700px; margin:0 auto 70px auto;">
      당신의 후원은<br>
      온포럼의 연구와 기록,<br>
      그리고 다음 세대의 질문을 이어갑니다.
    </p>

  </div>
<div style="display:flex; gap:30px; flex-wrap:wrap; margin-top:20px;">

  <div style="flex:1; min-width:280px; background:#fff; border-radius:16px; padding:40px; box-shadow:0 15px 40px rgba(0,0,0,0.05);">

      일시후원하기 →
    </a>
  </div>

  <div style="flex:1; min-width:280px; background:#fff; border-radius:16px; padding:40px; box-shadow:0 15px 40px rgba(0,0,0,0.05);">
    <h2 style="margin-top:0; color:var(--deep-blue);">정기후원</h2>
    <p>매월 일정한 후원으로<br>온포럼의 연구를 함께 이어갑니다.</p>
    <a href="#" style="display:inline-block; margin-top:20px; padding:12px 22px; background:var(--gold); color:#fff; text-decoration:none; border-radius:6px;">
      정기후원하기 →
    </a>
  </div>

</div>
<div style="text-align:center; margin-top:70px;">

  <p style="font-size:1.08rem; line-height:2; max-width:700px; margin:0 auto;">
    후원은 금액보다<br>
    함께 같은 방향을 바라보는 마음에서 시작됩니다.
  </p>

  <a href="/index.html"
     style="display:inline-block; margin-top:30px; color:var(--deep-blue); text-decoration:none; font-weight:600;">
    ← 홈으로 돌아가기
  </a>

</div>  
</div>
</body>
</html>
