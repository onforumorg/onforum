<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ON-FORUM | Cases</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

<style>
:root {
    --primary-color: #2c3e50;
    --bg-color: #f8f9fa;
    --text-color: #333;
    --accent-color: #b5945d;
}
body {
    font-family: 'Pretendard', sans-serif;
    background: var(--bg-color);
    margin: 0;
}
.container {
    max-width: 800px;
    margin: auto;
    padding: 40px 20px;
}
.lang-switch {
    position: fixed;
    top: 20px;
    right: 30px;
}
.lang-btn {
    border: none;
    background: none;
    cursor: pointer;
    font-weight: bold;
}
.lang-btn.active {
    border-bottom: 2px solid #000;
}
header {
    text-align: center;
    margin-bottom: 40px;
}
.case {
    background: white;
    padding: 30px;
    margin-bottom: 25px;
    border-left: 5px solid var(--accent-color);
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.04);
}
.tag {
    font-size: 0.8rem;
    background: #eee;
    padding: 4px 10px;
    display: inline-block;
    margin-bottom: 12px;
}
.case h2 {
    margin-bottom: 15px;
}
.block {
    margin-bottom: 12px;
    line-height: 1.6;
}
.block strong {
    display: block;
    font-size: 0.9rem;
    color: #777;
    margin-bottom: 3px;
}
.impact {
    margin-top: 15px;
    font-weight: 700;
    color: var(--accent-color);
}
.back {
    text-align: center;
    margin-top: 40px;
}
.back a {
    text-decoration: none;
    color: var(--primary-color);
    font-weight: 700;
}
</style>
</head>

<body>

<nav class="lang-switch">
    <button id="btn-ko" class="lang-btn" onclick="setLang('ko')">KOR</button>
    <button id="btn-en" class="lang-btn" onclick="setLang('en')">ENG</button>
</nav>

<div class="container">

<header>
    <h1 data-i18n="title"></h1>
    <p data-i18n="subtitle"></p>
</header>

<div id="case-list"></div>

<div class="back">
    <a href="index.html" data-i18n="back"></a>
</div>

</div>

<script>

const content = {
    title: {
        ko: "적용 사례",
        en: "Practical Cases"
    },
    subtitle: {
        ko: "구조 분석이 현실을 어떻게 바꾸는가",
        en: "How structural analysis transforms reality"
    },
    back: {
        ko: "← 메인으로 돌아가기",
        en: "← Back to Home"
    }
};

const cases = [
{
    tag: { ko: "개인 및 의사결정", en: "Individual & Decision" },
    title: { ko: "반복되는 판단 착오의 구조적 해결", en: "Breaking Repeated Judgment Errors" },
    problem: {
        ko: "같은 실수를 반복한다",
        en: "Repeating the same mistakes"
    },
    existing: {
        ko: "정보를 더 찾거나 감정을 통제하려 한다",
        en: "Trying to control emotions or gather more information"
    },
    structure: {
        ko: "판단 기준 자체가 구조적으로 부재",
        en: "Lack of structural decision criteria"
    },
    result: {
        ko: "기준이 생기면서 반복이 멈춘다",
        en: "Once criteria form, repetition stops"
    },
    impact: {
        ko: "문제 해결이 아니라 반복 자체가 사라진다",
        en: "Not solving problems, but eliminating repetition"
    }
},
{
    tag: { ko: "조직 및 사회", en: "Organization & Society" },
    title: { ko: "갈등 구조의 가시화와 흐름 조정", en: "Restructuring Conflict Dynamics" },
    problem: {
        ko: "같은 갈등이 반복된다",
        en: "Recurring conflicts"
    },
    existing: {
        ko: "사람을 바꾸거나 소통을 늘린다",
        en: "Replacing people or increasing communication"
    },
    structure: {
        ko: "정보와 권한의 흐름이 비대칭",
        en: "Asymmetry in information and authority flow"
    },
    result: {
        ko: "구조 조정으로 갈등이 자연스럽게 감소",
        en: "Conflict decreases through structural adjustment"
    },
    impact: {
        ko: "갈등을 해결하는 것이 아니라 발생 조건이 사라진다",
        en: "Not resolving conflict, but removing its cause"
    }
},
{
    tag: { ko: "학습 및 교육", en: "Learning & Education" },
    title: { ko: "이해하지 못하는 학습의 구조적 전환", en: "Fixing Ineffective Learning Structures" },
    problem: {
        ko: "공부해도 이해되지 않는다",
        en: "Studying but not understanding"
    },
    existing: {
        ko: "더 많은 반복과 암기를 시도한다",
        en: "More repetition and memorization"
    },
    structure: {
        ko: "정보 흐름이 아닌 구조 이해가 결여됨",
        en: "Lack of structural understanding of knowledge"
    },
    result: {
        ko: "구조를 이해하면서 학습 효율이 급상승",
        en: "Understanding structure boosts learning efficiency"
    },
    impact: {
        ko: "양이 아니라 이해 구조가 학습을 결정한다",
        en: "Learning depends on structure, not volume"
    }
}
];

function renderCases(lang) {
    const container = document.getElementById("case-list");
    container.innerHTML = "";

    cases.forEach(c => {
        const el = document.createElement("div");
        el.className = "case";

        el.innerHTML = `
            <div class="tag">${c.tag[lang]}</div>
            <h2>${c.title[lang]}</h2>

            <div class="block">
                <strong>문제</strong>
                ${c.problem[lang]}
            </div>

            <div class="block">
                <strong>기존 접근</strong>
                ${c.existing[lang]}
            </div>

            <div class="block">
                <strong>구조 분석</strong>
                ${c.structure[lang]}
            </div>

            <div class="block">
                <strong>변화</strong>
                ${c.result[lang]}
            </div>

            <div class="impact">
                ${c.impact[lang]}
            </div>
        `;

        container.appendChild(el);
    });
}

function setLang(lang) {
    localStorage.setItem("lang", lang);

    document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.dataset.i18n;
        el.innerText = content[key][lang];
    });

    renderCases(lang);

    document.getElementById("btn-ko").classList.toggle("active", lang === "ko");
    document.getElementById("btn-en").classList.toggle("active", lang === "en");
}

window.onload = function() {
    const lang = localStorage.getItem("lang") || "ko";
    setLang(lang);
};

</script>

</body>
</html>
