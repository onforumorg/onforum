function renderCases(lang){

const container = document.getElementById("case-list");

container.innerHTML = "";

document.getElementById("title").innerHTML = content.title[lang];
document.getElementById("hero-desc").innerHTML = content.hero[lang];

cases.forEach(c=>{

const el = document.createElement("section");

el.className = "case";

el.id = c.id;

el.innerHTML = `

<div class="tag">${c.tag[lang]}</div>

<h2>${c.title[lang]}</h2>

<div class="case-intro">
${c.intro[lang]}
</div>

<div class="grid">

<div class="block">
<strong>${content.labels.problem[lang]}</strong>
${c.problem[lang]}
</div>

<div class="block">
<strong>${content.labels.existing[lang]}</strong>
${c.existing[lang]}
</div>

<div class="block">
<strong>${content.labels.structure[lang]}</strong>
${c.structure[lang]}
</div>

<div class="block">
<strong>${content.labels.flow[lang]}</strong>
${c.flow[lang]}
</div>

<div class="block">
<strong>${content.labels.resonance[lang]}</strong>
${c.resonance[lang]}
</div>

<div class="block">
<strong>${content.labels.transition[lang]}</strong>
${c.transition[lang]}
</div>

</div>

<div class="impact">
${c.impact[lang]}
</div>

`;

container.appendChild(el);

});

}

function setLang(lang){
localStorage.setItem("lang",lang);
renderCases(lang);
}

renderCases(localStorage.getItem("lang") || "ko");
