<!-- 핵심 부분만 표시 (전체 동일, 수정된 부분만 포함) -->
<script>

const cases = [
/* 그대로 유지 */
];

function renderCases(lang) {
    const container = document.getElementById("case-list");
    container.innerHTML = "";

    cases.forEach((c, index) => {  <!-- ✅ 수정 -->
        const el = document.createElement("div");
        el.className = "case";
        el.id = "case-" + index;   <!-- ✅ 추가 -->

        el.innerHTML = `
            <div class="tag">${c.tag[lang]}</div>
            <h2>${c.title[lang]}</h2>

            <div class="block">
                <strong>문제</strong>
                ${c.problem[lang]}
            </div>

            <div class="block">
                <strong>기존 접근</strong>
                ${c.existing[lang]}
            </div>

            <div class="block">
                <strong>구조 분석</strong>
                ${c.structure[lang]}
            </div>

            <div class="block">
                <strong>변화</strong>
                ${c.result[lang]}
            </div>

            <div class="impact">
                ${c.impact[lang]}
            </div>
        `;

        container.appendChild(el);
    });
}
</script>
