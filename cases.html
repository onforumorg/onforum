<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>적용 사례 | ON-FORUM</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>

<style>

body{
    font-family:'Pretendard',sans-serif;
    margin:0;
    background:
    radial-gradient(circle at 20% 20%, rgba(181,148,93,0.08), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(26,42,64,0.06), transparent 40%),
    linear-gradient(to bottom,#f7f6f2,#f2efe8);
    color:#222;
}

.top-bar{
    text-align:right;
    padding:20px 20px 0;
}

.top-bar button{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
    background:#1a2a40;
    color:#fff;
    margin-left:5px;
}

.hero{
    padding:60px 20px 40px;
    text-align:center;
}

.hero h1{
    font-size:2.8rem;
    margin-bottom:20px;
    color:#1a2a40;
}

.hero p{
    max-width:900px;
    margin:0 auto;
    line-height:2;
    font-size:1.08rem;
    color:#444;
}

.case{
    max-width:1100px;
    margin:60px auto;
    padding:45px;
    background:rgba(255,255,255,0.88);
    border-radius:22px;
    box-shadow:0 12px 30px rgba(0,0,0,0.06);
}

.tag{
    display:inline-block;
    padding:8px 14px;
    border-radius:999px;
    background:rgba(181,148,93,0.12);
    color:#8b6b35;
    font-size:0.9rem;
    font-weight:700;
    margin-bottom:18px;
}

.case h2{
    margin-top:0;
    margin-bottom:25px;
    color:#1a2a40;
    font-size:2rem;
}

.case-intro{
    line-height:2;
    color:#444;
    margin-bottom:40px;
    font-size:1.03rem;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:22px;
}

.block{
    background:#fff;
    padding:24px;
    border-radius:16px;
    box-shadow:0 8px 18px rgba(0,0,0,0.04);
    line-height:1.9;
}

.block strong{
    display:block;
    margin-bottom:12px;
    color:#1a2a40;
    font-size:1.05rem;
}

.impact{
    margin-top:35px;
    padding:28px;
    border-radius:16px;
    background:#1a2a40;
    color:#fff;
    line-height:2;
    text-align:center;
    font-size:1.02rem;
}

@media(max-width:768px){

    body{
        padding:0;
    }

    .hero h1{
        font-size:2.2rem;
    }

    .case{
        margin:30px 15px;
        padding:28px;
    }

}

</style>
</head>

<body>

<div class="top-bar">
<button onclick="setLang('ko')">KOR</button>
<button onclick="setLang('en')">ENG</button>
</div>

<section class="hero">

<h1 id="title"></h1>

<p id="hero-desc"></p>

</section>

<div id="case-list"></div>

function renderCases(lang){

const container = document.getElementById("case-list");

container.innerHTML = "";

document.getElementById("title").innerHTML = content.title[lang];
document.getElementById("hero-desc").innerHTML = content.hero[lang];

cases.forEach(c=>{

const el = document.createElement("section");

el.className = "case";

el.id = c.id;

el.innerHTML = `

<div class="tag">${c.tag[lang]}</div>

<h2>${c.title[lang]}</h2>

<div class="case-intro">
${c.intro[lang]}
</div>

<div class="grid">

<div class="block">
<strong>${content.labels.problem[lang]}</strong>
${c.problem[lang]}
</div>

<div class="block">
<strong>${content.labels.existing[lang]}</strong>
${c.existing[lang]}
</div>

<div class="block">
<strong>${content.labels.structure[lang]}</strong>
${c.structure[lang]}
</div>

<div class="block">
<strong>${content.labels.flow[lang]}</strong>
${c.flow[lang]}
</div>

<div class="block">
<strong>${content.labels.resonance[lang]}</strong>
${c.resonance[lang]}
</div>

<div class="block">
<strong>${content.labels.transition[lang]}</strong>
${c.transition[lang]}
</div>

</div>

<div class="impact">
${c.impact[lang]}
</div>

`;

container.appendChild(el);

});

}

function setLang(lang){
localStorage.setItem("lang",lang);
renderCases(lang);
}

window.onload=function(){
renderCases(localStorage.getItem("lang") || "ko");
};
