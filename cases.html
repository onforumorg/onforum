<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ON-FORUM | Cases</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

<style>
:root {
    --primary-color: #2c3e50;
    --bg-color: #f8f9fa;
    --text-color: #333;
    --accent-color: #b5945d;
}
body {
    font-family: 'Pretendard', sans-serif;
    background: var(--bg-color);
    margin: 0;
}
.container {
    max-width: 800px;
    margin: auto;
    padding: 40px 20px;
}
.lang-switch {
    position: fixed;
    top: 20px;
    right: 30px;
}
.lang-btn {
    border: none;
    background: none;
    cursor: pointer;
    font-weight: bold;
}
.lang-btn.active {
    border-bottom: 2px solid #000;
}
header {
    text-align: center;
    margin-bottom: 40px;
}
.case {
    background: white;
    padding: 30px;
    margin-bottom: 20px;
    border-left: 5px solid var(--accent-color);
    border-radius: 8px;
}
.tag {
    font-size: 0.8rem;
    background: #eee;
    padding: 4px 10px;
    display: inline-block;
    margin-bottom: 10px;
}
.back {
    text-align: center;
    margin-top: 30px;
}
</style>
</head>

<body>

<nav class="lang-switch">
    <button id="btn-ko" class="lang-btn" onclick="setLang('ko')">KOR</button>
    <button id="btn-en" class="lang-btn" onclick="setLang('en')">ENG</button>
</nav>

<div class="container">

<header>
    <h1 data-i18n="title"></h1>
    <p data-i18n="subtitle"></p>
</header>

<div id="case-list"></div>

<div class="back">
    <a href="index.html" data-i18n="back"></a>
</div>

</div>

<script>

const content = {
    title: {
        ko: "적용 사례",
        en: "Practical Cases"
    },
    subtitle: {
        ko: "구조 분석이 실제 현실에 적용된 사례",
        en: "Applications of structural analysis"
    },
    back: {
        ko: "← 메인으로 돌아가기",
        en: "← Back to Home"
    }
};

const cases = [
{
    tag: {
        ko: "개인 및 의사결정",
        en: "Individual & Decision"
    },
    title: {
        ko: "반복되는 판단 착오의 구조적 해결",
        en: "Solving Recurring Judgment Errors"
    },
    desc: {
        ko: "감정이 아닌 판단 구조의 결함을 분석하여 해결 기준 제시",
        en: "Identifying structural flaws in judgment instead of emotions"
    }
},
{
    tag: {
        ko: "조직 및 사회",
        en: "Organization & Society"
    },
    title: {
        ko: "갈등 구조의 가시화와 흐름 조정",
        en: "Visualizing Conflict Structures"
    },
    desc: {
        ko: "정보와 권한 구조의 비대칭을 해결",
        en: "Resolving asymmetry in information and authority"
    }
}
];

function renderCases(lang) {
    const container = document.getElementById("case-list");
    container.innerHTML = "";

    cases.forEach(c => {
        const el = document.createElement("div");
        el.className = "case";

        el.innerHTML = `
            <div class="tag">${c.tag[lang]}</div>
            <h2>${c.title[lang]}</h2>
            <p>${c.desc[lang]}</p>
        `;

        container.appendChild(el);
    });
}

function setLang(lang) {
    localStorage.setItem("lang", lang);

    document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.dataset.i18n;
        el.innerText = content[key][lang];
    });

    renderCases(lang);

    document.getElementById("btn-ko").classList.toggle("active", lang === "ko");
    document.getElementById("btn-en").classList.toggle("active", lang === "en");
}

window.onload = function() {
    const lang = localStorage.getItem("lang") || "ko";
    setLang(lang);
};

</script>

</body>
</html>
