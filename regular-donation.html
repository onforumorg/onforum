<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정기후원 | ON-FORUM</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>

<style>

:root{
--bg-main:#f7f6f2;
--deep-blue:#1a2a40;
--gold:#b5945d;
--text:#1a1a1a;
--sub:#666;
}

body{
margin:0;
font-family:'Pretendard',sans-serif;
background:
radial-gradient(circle at 20% 30%, rgba(181,148,93,0.08), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(26,42,64,0.05), transparent 40%),
var(--bg-main);
color:var(--text);
}

.container{
max-width:900px;
margin:auto;
padding:60px 20px;
}

.card{
background:#fff;
padding:50px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,.05);
}

h1{
text-align:center;
color:var(--deep-blue);
margin-bottom:25px;
}

p{
line-height:2;
color:var(--sub);
}

.button{
display:inline-block;
padding:14px 26px;
border-radius:6px;
text-decoration:none;
color:#fff;
font-weight:600;
margin-top:15px;
}

.bank{
background:var(--deep-blue);
}

.cardpay{
background:var(--gold);
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>정기후원</h1>

<p style="text-align:center;font-size:1.1rem;">
정기적인 후원은<br>

</p>

<div style="margin-top:50px;border-top:1px solid rgba(0,0,0,.08);padding-top:40px;">

<h2 style="color:var(--deep-blue);margin-bottom:25px;">후원 방법</h2>

<p>
매월 약정한 금액을 자동으로 후원하실 수 있습니다.

<div style="margin-top:35px;text-align:center;">

<a href="#"
class="button bank">
정기후원 신청하기
</a>

</div>

<p style="margin-top:40px;font-size:0.95rem;text-align:center;">
신청 페이지에서 계좌 자동이체 또는 신용카드를 선택하여<br>
정기후원을 신청하실 수 있습니다.
</p>

</div>

<div style="text-align:center;margin-top:50px;">

<a href="donate.html"
style="color:var(--deep-blue);text-decoration:none;font-weight:600;">
← 공진후원으로 돌아가기
</a>

</div>

</div>

</div>
