<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>개인 판단 구조 | ON-FORUM</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>

<style>

body{
    font-family:'Pretendard',sans-serif;
    margin:0;
    background:
    radial-gradient(circle at 20% 20%, rgba(181,148,93,0.08), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(26,42,64,0.06), transparent 40%),
    linear-gradient(to bottom,#f7f6f2,#f2efe8);
    color:#222;
}

.top-bar{
    text-align:right;
    padding:20px 20px 0;
}

.top-bar button{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
    background:#1a2a40;
    color:#fff;
    margin-left:5px;
}

.hero{
    padding:60px 20px 40px;
    text-align:center;
}

.hero h1{
    font-size:2.8rem;
    color:#1a2a40;
    margin-bottom:20px;
}

.hero p{
    max-width:900px;
    margin:0 auto;
    line-height:2;
    font-size:1.08rem;
    color:#444;
}

.case{
    max-width:1100px;
    margin:60px auto;
    padding:45px;
    background:rgba(255,255,255,.88);
    border-radius:22px;
    box-shadow:0 12px 30px rgba(0,0,0,.06);
}

.tag{
    display:inline-block;
    padding:8px 14px;
    border-radius:999px;
    background:rgba(181,148,93,.12);
    color:#8b6b35;
    font-size:.9rem;
    font-weight:700;
    margin-bottom:18px;
}

.case h2{
    margin-top:0;
    margin-bottom:25px;
    color:#1a2a40;
    font-size:2rem;
}

.case-intro{
    line-height:2;
    color:#444;
    margin-bottom:40px;
    font-size:1.03rem;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:22px;
}

.block{
    background:#fff;
    padding:24px;
    border-radius:16px;
    box-shadow:0 8px 18px rgba(0,0,0,.04);
    line-height:1.9;
}

.block strong{
    display:block;
    margin-bottom:12px;
    color:#1a2a40;
    font-size:1.05rem;
}

.impact{
    margin-top:40px;
    padding:28px;
    border-left:5px solid #b5945d;
    background:#faf8f2;
    font-size:1.08rem;
    line-height:2;
    font-weight:600;
}

.back{
    text-align:center;
    margin:60px 0;
}

.back a{
    display:inline-block;
    padding:12px 24px;
    border-radius:10px;
    text-decoration:none;
    background:#1a2a40;
    color:#fff;
    font-weight:700;
}

.back a:hover{
    opacity:.9;
}

@media(max-width:768px){

.hero h1{
    font-size:2.2rem;
}

.case{
    margin:30px 15px;
    padding:28px;
}

}

</style>

</head>

<body>

<div class="top-bar">
    <button onclick="setLang('ko')">KOR</button>
    <button onclick="setLang('en')">ENG</button>
</div>

<section class="hero">

    <h1 id="title"></h1>

    <p id="hero-desc"></p>

</section>

<section class="case">

    <div class="tag" id="tag"></div>

    <h2 id="case-title"></h2>

    <div class="case-intro" id="case-intro"></div>

    <div class="grid">

        <div class="block">
            <strong id="label-problem"></strong>
            <div id="problem"></div>
        </div>

        <div class="block">
            <strong id="label-existing"></strong>
            <div id="existing"></div>
        </div>

        <div class="block">
            <strong id="label-structure"></strong>
            <div id="structure"></div>
        </div>

        <div class="block">
            <strong id="label-flow"></strong>
            <div id="flow"></div>
        </div>

        <div class="block">
            <strong id="label-resonance"></strong>
            <div id="resonance"></div>
        </div>

        <div class="block">
            <strong id="label-transition"></strong>
            <div id="transition"></div>
        </div>

    </div>

    <div class="impact" id="impact"></div>

</section>

<div class="back">
    <a href="index.html" id="back-btn"></a>
</div>

<script>  

const content = {

title:{
    ko:"개인 판단 구조",
    en:"Personal Judgment Structure"
},

hero:{
    ko:"반복되는 판단 오류와 방향 혼란은 단순한 정보 부족이 아니라 기준 구조와 감응 흐름의 불안정에서 비롯될 수 있습니다.",
    en:"Repeated errors in judgment may arise not from a lack of information, but from unstable internal structures and disrupted patterns of perception."
},

back:{
    ko:"← 사례 목록으로",
    en:"← Back to Cases"
},

labels:{
    problem:{ko:"1. 현실 현상", en:"1. Reality"},
    existing:{ko:"2. 기존 접근 방식", en:"2. Existing Approach"},
    structure:{ko:"3. 구조 분석", en:"3. Structural Analysis"},
    flow:{ko:"4. 흐름 분석", en:"4. Flow Analysis"},
    resonance:{ko:"5. 공진 분석", en:"5. Resonance Analysis"},
    transition:{ko:"6. 구조 전환", en:"6. Structural Transition"}
}

};

const data={

tag:{
    ko:"개인 판단 구조",
    en:"Personal Judgment Structure"
},

title:{
    ko:"반복되는 선택 실패와 방향 혼란",
    en:"Recurring Failure in Judgment and Direction"
},

intro:{
    ko:"반복되는 판단 오류와 방향 상실은 단순한 정보 부족이 아니라 기준 구조와 감응 흐름의 불안정에서 비롯될 수 있습니다.",
    en:"Repeated errors in judgment may arise not from a lack of information, but from unstable internal structures and disrupted patterns of perception."
},

problem:{
    ko:"많은 사람들은 충분한 정보를 가지고 있음에도 반복적인 후회와 방향 혼란을 경험합니다.<br><br>비슷한 선택 실패가 반복되고, 결정 이후에도 쉽게 흔들리며 판단 피로가 누적됩니다.",
    en:"Many people continue to experience confusion and regret despite having access to abundant information."
},

existing:{
    ko:"기존에는 이를 정보 부족, 경험 부족, 감정 문제로 보는 경우가 많았습니다.<br><br>그래서 더 많은 정보와 조언, 동기부여를 통해 해결하려 합니다.",
    en:"Conventional approaches often interpret this as a problem of insufficient information or emotional weakness."
},

structure:{
    ko:"온포럼은 이를 단순 능력 문제가 아니라 기준 구조의 불안정 문제로 봅니다.<br><br>판단 중심 구조가 형성되지 않으면 외부 환경과 자극에 따라 선택 기준이 계속 흔들릴 수 있습니다.",
    en:"ON-FORUM views this as instability within the structure of judgment itself."
},

flow:{
    ko:"정보 과잉 환경 속에서 사람은 비교 → 불안 → 반응 → 재선택의 흐름을 반복하기 쉽습니다.<br><br>이 과정에서 자신의 기준보다 외부 흐름에 반응하는 구조가 강화됩니다.",
    en:"Comparison, anxiety, reaction and repeated choice reinforce unstable judgment."
},

resonance:{
    ko:"선택과 존재 방향이 분리될 경우 행동은 이루어져도 내면의 안정은 형성되지 않을 수 있습니다.<br><br>온포럼은 이를 존재와 판단의 비공진 상태로 해석합니다.",
    en:"ON-FORUM interprets this as dissonance between existence and judgment."
},

transition:{
    ko:"온포럼은 문제 해결 이전에 판단의 중심 구조를 먼저 회복하는 접근을 제안합니다.<br><br>정보 이전에 기준, 반응 이전에 방향, 선택 이전에 존재 흐름을 재정립하는 것입니다.",
    en:"Restore the structure of judgment before solving surface-level problems."
},

impact:{
    ko:"판단은 단순한 선택 기술이 아니라,<br>어떤 구조 위에서 현실을 바라보는가의 문제일 수 있습니다.",
    en:"Judgment reflects the structure through which reality itself is perceived."
}

};  

  function render(lang){

    document.getElementById("title").innerHTML = content.title[lang];
    document.getElementById("hero-desc").innerHTML = content.hero[lang];

    document.getElementById("tag").innerHTML = data.tag[lang];
    document.getElementById("case-title").innerHTML = data.title[lang];
    document.getElementById("case-intro").innerHTML = data.intro[lang];

    document.getElementById("label-problem").innerHTML = content.labels.problem[lang];
    document.getElementById("label-existing").innerHTML = content.labels.existing[lang];
    document.getElementById("label-structure").innerHTML = content.labels.structure[lang];
    document.getElementById("label-flow").innerHTML = content.labels.flow[lang];
    document.getElementById("label-resonance").innerHTML = content.labels.resonance[lang];
    document.getElementById("label-transition").innerHTML = content.labels.transition[lang];

    document.getElementById("problem").innerHTML = data.problem[lang];
    document.getElementById("existing").innerHTML = data.existing[lang];
    document.getElementById("structure").innerHTML = data.structure[lang];
    document.getElementById("flow").innerHTML = data.flow[lang];
    document.getElementById("resonance").innerHTML = data.resonance[lang];
    document.getElementById("transition").innerHTML = data.transition[lang];

    document.getElementById("impact").innerHTML = data.impact[lang];

    document.getElementById("back-btn").innerHTML = content.back[lang];
}

function setLang(lang){
    localStorage.setItem("lang", lang);
    render(lang);
}

window.onload = function(){
    render(localStorage.getItem("lang") || "ko");
};

</script>

</body>
</html>
