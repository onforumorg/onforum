<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>사회 · 정치 구조 | ON-FORUM</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>

<style>

body{
    font-family:'Pretendard',sans-serif;
    margin:0;
    background:
    radial-gradient(circle at 20% 20%, rgba(181,148,93,0.08), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(26,42,64,0.06), transparent 40%),
    linear-gradient(to bottom,#f7f6f2,#f2efe8);
    color:#222;
}

.top-bar{
    text-align:right;
    padding:20px 20px 0;
}

.top-bar button{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
    background:#1a2a40;
    color:#fff;
    margin-left:5px;
}

.hero{
    padding:60px 20px 40px;
    text-align:center;
}

.hero h1{
    font-size:2.8rem;
    color:#1a2a40;
    margin-bottom:20px;
}

.hero p{
    max-width:900px;
    margin:0 auto;
    line-height:2;
    font-size:1.08rem;
    color:#444;
}

.case{
    max-width:1100px;
    margin:60px auto;
    padding:45px;
    background:rgba(255,255,255,.88);
    border-radius:22px;
    box-shadow:0 12px 30px rgba(0,0,0,.06);
}

.tag{
    display:inline-block;
    padding:8px 14px;
    border-radius:999px;
    background:rgba(181,148,93,.12);
    color:#8b6b35;
    font-size:.9rem;
    font-weight:700;
    margin-bottom:18px;
}

.case h2{
    margin-top:0;
    margin-bottom:25px;
    color:#1a2a40;
    font-size:2rem;
}

.case-intro{
    line-height:2;
    color:#444;
    margin-bottom:40px;
    font-size:1.03rem;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:22px;
}

.block{
    background:#fff;
    padding:24px;
    border-radius:16px;
    box-shadow:0 8px 18px rgba(0,0,0,.04);
    line-height:1.9;
}

.block strong{
    display:block;
    margin-bottom:12px;
    color:#1a2a40;
    font-size:1.05rem;
}

.impact{
    margin-top:40px;
    padding:28px;
    border-left:5px solid #b5945d;
    background:#faf8f2;
    font-size:1.08rem;
    line-height:2;
    font-weight:600;
}

.back{
    text-align:center;
    margin:60px 0;
}

.back a{
    display:inline-block;
    padding:12px 24px;
    border-radius:10px;
    text-decoration:none;
    background:#1a2a40;
    color:#fff;
    font-weight:700;
}

.back a:hover{
    opacity:.9;
}

@media(max-width:768px){

.hero h1{
    font-size:2.2rem;
}

.case{
    margin:30px 15px;
    padding:28px;
}

}

</style>

</head>

<body>

<div class="top-bar">
    <button onclick="setLang('ko')">KOR</button>
    <button onclick="setLang('en')">ENG</button>
</div>

<section class="hero">

    <h1 id="title"></h1>

    <p id="hero-desc"></p>

</section>

<section class="case">

    <div class="tag" id="tag"></div>

    <h2 id="case-title"></h2>

    <div class="case-intro" id="case-intro"></div>

    <div class="grid">

        <div class="block">
            <strong id="label-problem"></strong>
            <div id="problem"></div>
        </div>

        <div class="block">
            <strong id="label-existing"></strong>
            <div id="existing"></div>
        </div>

        <div class="block">
            <strong id="label-structure"></strong>
            <div id="structure"></div>
        </div>

        <div class="block">
            <strong id="label-flow"></strong>
            <div id="flow"></div>
        </div>

        <div class="block">
            <strong id="label-resonance"></strong>
            <div id="resonance"></div>
        </div>

        <div class="block">
            <strong id="label-transition"></strong>
            <div id="transition"></div>
        </div>

    </div>

    <div class="impact" id="impact"></div>

</section>

<div class="back">
    <a href="index.html" id="back-btn"></a>
</div>

<script>  

const content = {

title:{
    ko:"사회 · 정치 구조",
    en:"Social & Political Structure"
},

hero:{
    ko:"사회 내부의 지속적인 갈등과 불안은 단순한 사건 충돌이 아니라 구조 방향성과 공진 실패의 누적 결과일 수 있습니다.",
    en:"Persistent social conflict and instability may emerge not simply from isolated events, but from accumulated structural divergence and failed resonance within society."
},

back:{
    ko:"← 사례 목록으로",
    en:"← Back to Cases"
},

labels:{
    problem:{ko:"1. 현실 현상", en:"1. Reality"},
    existing:{ko:"2. 기존 접근 방식", en:"2. Existing Approach"},
    structure:{ko:"3. 구조 분석", en:"3. Structural Analysis"},
    flow:{ko:"4. 흐름 분석", en:"4. Flow Analysis"},
    resonance:{ko:"5. 공진 분석", en:"5. Resonance Analysis"},
    transition:{ko:"6. 구조 전환", en:"6. Structural Transition"}
}

};

const data={

tag:{
    ko:"사회 · 정치 구조",
    en:"Social & Political Structure"
},

title:{
    ko:"반복되는 사회 갈등과 불안",
    en:"Recurring Social Conflict and Instability"
},

intro:{
    ko:"사회 내부의 지속적인 갈등과 불안은 단순한 사건 충돌이 아니라 구조 방향성과 공진 실패의 누적 결과일 수 있습니다.",
    en:"Persistent social conflict and instability may emerge not simply from isolated events, but from accumulated structural divergence and failed resonance within society."
},

problem:{
    ko:"현대 사회에서는 세대, 계층, 이념, 지역, 가치관 사이의 갈등이 반복적으로 증폭되고 있습니다.<br><br>문제가 해결된 것처럼 보여도 유사한 충돌과 불안이 계속해서 새로운 형태로 재발하기도 합니다.",
    en:"Modern societies repeatedly experience intensifying conflict across generations, classes, ideologies, regions, and systems of values.<br><br>Even when issues appear temporarily resolved, similar tensions often re-emerge in new forms."
},

existing:{
    ko:"기존에는 이를 특정 집단의 문제, 정치적 대립, 경제적 이해관계 충돌 중심으로 해석하는 경우가 많았습니다.<br><br>그래서 정책 변화나 제도 조정 중심의 대응이 반복되기도 합니다.",
    en:"Conventional approaches often interpret these conflicts through political opposition, economic interests, or the actions of specific groups.<br><br>As a result, responses frequently focus on policy adjustments or institutional reforms."
},

structure:{
    ko:"온포럼(ON-FORUM)은 사회 갈등을 단순한 의견 충돌이 아니라 사회 구조 방향성의 분열 문제로 바라봅니다.<br><br>공동체 내부의 기준 흐름과 존재 방향이 장기간 분산될 경우 구조적 불안정성이 점차 확대될 수 있습니다.",
    en:"ON-FORUM views social conflict not merely as disagreement between opinions, but as fragmentation within the directional structure of society itself.<br><br>When collective standards and existential orientations become increasingly divided over time, structural instability gradually expands."
},

flow:{
    ko:"사회 안에서는 불안 → 반응 → 대립 → 피로의 흐름이 반복적으로 순환될 수 있습니다.<br><br>특히 빠른 정보 확산과 감정 중심 반응 구조가 결합될 경우 갈등 흐름은 더욱 증폭되기 쉽습니다.",
    en:"Within society, cycles of anxiety, reaction, confrontation, and exhaustion can continuously reinforce one another.<br><br>When rapid information spread combines with emotionally reactive systems, social tension becomes increasingly amplified."
},

resonance:{
    ko:"사회 구성원들이 동일 공간 안에 존재하더라도 공통 방향성과 연결감을 상실할 경우 공동체 내부의 공진은 약화될 수 있습니다.<br><br>온포럼은 이를 사회 구조 내부의 비공진 상태로 해석합니다.",
    en:"Even when people share the same social space, communal resonance may weaken if common direction and meaningful connection are lost.<br><br>ON-FORUM interprets this as a state of dissonance within social structures."
},

transition:{
    ko:"온포럼은 단순한 갈등 억제 이전에 사회 흐름 구조 자체를 분석하는 접근을 제안합니다.<br><br>누가 옳은가 이전에 어떤 방향 구조가 사회 전체를 움직이고 있는가를 먼저 바라보는 것입니다.",
    en:"ON-FORUM proposes examining the structural flows of society before attempting to suppress conflict itself.<br><br>The focus shifts from determining who is right to understanding which directional structures are moving society as a whole."
},

impact:{
    ko:"사회 문제는 단순한 충돌의 문제가 아니라,<br>어떤 방향 구조 위에서 공동체 흐름이 형성되고 있는가의 문제일 수 있습니다.",
    en:"Social problems may not simply arise from conflict itself,<br>but from the directional structures through which collective flows are formed."
}

};
  
  function render(lang){

    document.getElementById("title").innerHTML = content.title[lang];
    document.getElementById("hero-desc").innerHTML = content.hero[lang];

    document.getElementById("tag").innerHTML = data.tag[lang];
    document.getElementById("case-title").innerHTML = data.title[lang];
    document.getElementById("case-intro").innerHTML = data.intro[lang];

    document.getElementById("label-problem").innerHTML = content.labels.problem[lang];
    document.getElementById("label-existing").innerHTML = content.labels.existing[lang];
    document.getElementById("label-structure").innerHTML = content.labels.structure[lang];
    document.getElementById("label-flow").innerHTML = content.labels.flow[lang];
    document.getElementById("label-resonance").innerHTML = content.labels.resonance[lang];
    document.getElementById("label-transition").innerHTML = content.labels.transition[lang];

    document.getElementById("problem").innerHTML = data.problem[lang];
    document.getElementById("existing").innerHTML = data.existing[lang];
    document.getElementById("structure").innerHTML = data.structure[lang];
    document.getElementById("flow").innerHTML = data.flow[lang];
    document.getElementById("resonance").innerHTML = data.resonance[lang];
    document.getElementById("transition").innerHTML = data.transition[lang];

    document.getElementById("impact").innerHTML = data.impact[lang];

    document.getElementById("back-btn").innerHTML = content.back[lang];
}

function setLang(lang){
    localStorage.setItem("lang", lang);
    render(lang);
}

window.onload = function(){
    render(localStorage.getItem("lang") || "ko");
};

</script>

</body>
</html>
