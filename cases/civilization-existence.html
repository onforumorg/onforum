<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>문명 · 존재 구조 | ON-FORUM</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>

<style>

body{
    font-family:'Pretendard',sans-serif;
    margin:0;
    background:
    radial-gradient(circle at 20% 20%, rgba(181,148,93,0.08), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(26,42,64,0.06), transparent 40%),
    linear-gradient(to bottom,#f7f6f2,#f2efe8);
    color:#222;
}

.top-bar{
    text-align:right;
    padding:20px 20px 0;
}

.top-bar button{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
    background:#1a2a40;
    color:#fff;
    margin-left:5px;
}

.hero{
    padding:60px 20px 40px;
    text-align:center;
}

.hero h1{
    font-size:2.8rem;
    color:#1a2a40;
    margin-bottom:20px;
}

.hero p{
    max-width:900px;
    margin:0 auto;
    line-height:2;
    font-size:1.08rem;
    color:#444;
}

.case{
    max-width:1100px;
    margin:60px auto;
    padding:45px;
    background:rgba(255,255,255,.88);
    border-radius:22px;
    box-shadow:0 12px 30px rgba(0,0,0,.06);
}

.tag{
    display:inline-block;
    padding:8px 14px;
    border-radius:999px;
    background:rgba(181,148,93,.12);
    color:#8b6b35;
    font-size:.9rem;
    font-weight:700;
    margin-bottom:18px;
}

.case h2{
    margin-top:0;
    margin-bottom:25px;
    color:#1a2a40;
    font-size:2rem;
}

.case-intro{
    line-height:2;
    color:#444;
    margin-bottom:40px;
    font-size:1.03rem;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:22px;
}

.block{
    background:#fff;
    padding:24px;
    border-radius:16px;
    box-shadow:0 8px 18px rgba(0,0,0,.04);
    line-height:1.9;
}

.block strong{
    display:block;
    margin-bottom:12px;
    color:#1a2a40;
    font-size:1.05rem;
}

.impact{
    margin-top:40px;
    padding:28px;
    border-left:5px solid #b5945d;
    background:#faf8f2;
    font-size:1.08rem;
    line-height:2;
    font-weight:600;
}

.back{
    text-align:center;
    margin:60px 0;
}

.back a{
    display:inline-block;
    padding:12px 24px;
    border-radius:10px;
    text-decoration:none;
    background:#1a2a40;
    color:#fff;
    font-weight:700;
}

.back a:hover{
    opacity:.9;
}

@media(max-width:768px){

.hero h1{
    font-size:2.2rem;
}

.case{
    margin:30px 15px;
    padding:28px;
}

}

</style>

</head>

<body>

<div class="top-bar">
    <button onclick="setLang('ko')">KOR</button>
    <button onclick="setLang('en')">ENG</button>
</div>

<section class="hero">

    <h1 id="title"></h1>

    <p id="hero-desc"></p>

</section>

<section class="case">

    <div class="tag" id="tag"></div>

    <h2 id="case-title"></h2>

    <div class="case-intro" id="case-intro"></div>

    <div class="grid">

        <div class="block">
            <strong id="label-problem"></strong>
            <div id="problem"></div>
        </div>

        <div class="block">
            <strong id="label-existing"></strong>
            <div id="existing"></div>
        </div>

        <div class="block">
            <strong id="label-structure"></strong>
            <div id="structure"></div>
        </div>

        <div class="block">
            <strong id="label-flow"></strong>
            <div id="flow"></div>
        </div>

        <div class="block">
            <strong id="label-resonance"></strong>
            <div id="resonance"></div>
        </div>

        <div class="block">
            <strong id="label-transition"></strong>
            <div id="transition"></div>
        </div>

    </div>

    <div class="impact" id="impact"></div>

</section>

<div class="back">
    <a href="index.html" id="back-btn"></a>
</div>

<script>  

const content = {

    ko:"문명 · 존재 구조",

    en:"Modern civilization continues to advance rapidly, yet inner emptiness and existential anxiety may simultaneously continue to deepen."

back:{

labels:{

}

};

const data={

intro:{
    ko:"현대 문명은 빠르게 발전하고 있지만, 동시에 인간 내부의 공허와 불안 또한 함께 증가하는 현상을 보여주고 있을 수 있습니다.",

}; 

  function render(lang){

    document.getElementById("title").innerHTML = content.title[lang];
    document.getElementById("hero-desc").innerHTML = content.hero[lang];

    document.getElementById("tag").innerHTML = data.tag[lang];
    document.getElementById("case-title").innerHTML = data.title[lang];
    document.getElementById("case-intro").innerHTML = data.intro[lang];

    document.getElementById("label-problem").innerHTML = content.labels.problem[lang];
    document.getElementById("label-existing").innerHTML = content.labels.existing[lang];
    document.getElementById("label-structure").innerHTML = content.labels.structure[lang];
    document.getElementById("label-flow").innerHTML = content.labels.flow[lang];
    document.getElementById("label-resonance").innerHTML = content.labels.resonance[lang];
    document.getElementById("label-transition").innerHTML = content.labels.transition[lang];

    document.getElementById("problem").innerHTML = data.problem[lang];
    document.getElementById("existing").innerHTML = data.existing[lang];
    document.getElementById("structure").innerHTML = data.structure[lang];
    document.getElementById("flow").innerHTML = data.flow[lang];
    document.getElementById("resonance").innerHTML = data.resonance[lang];
    document.getElementById("transition").innerHTML = data.transition[lang];

    document.getElementById("impact").innerHTML = data.impact[lang];

    document.getElementById("back-btn").innerHTML = content.back[lang];
}

function setLang(lang){
    localStorage.setItem("lang", lang);
    render(lang);
}

window.onload = function(){
    render(localStorage.getItem("lang") || "ko");
};

</script>

</body>
</html>
