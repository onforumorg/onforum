<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ON-FORUM | Contact</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

<style>
body {
    font-family: 'Pretendard', sans-serif;
    margin: 0;
    background: #fff;
}
.container {
    max-width: 800px;
    margin: auto;
    padding: 60px 20px;
}
.lang-switch {
    position: fixed;
    top: 20px;
    right: 30px;
}
.lang-btn {
    border: none;
    background: none;
    cursor: pointer;
    font-weight: bold;
}
.lang-btn.active {
    border-bottom: 2px solid #000;
}
.section {
    margin-bottom: 60px;
}
.card {
    margin-bottom: 15px;
    padding: 15px;
    border: 1px solid #ddd;
}
.center {
    text-align: center;
}
</style>
</head>

<body>

<nav class="lang-switch">
    <button id="btn-ko" class="lang-btn" onclick="setLang('ko')">KOR</button>
    <button id="btn-en" class="lang-btn" onclick="setLang('en')">ENG</button>
</nav>

<div class="container">

<header class="center">
    <h1 data-i18n="title"></h1>
    <p data-i18n="subtitle"></p>
</header>

<section class="section center">
    <div data-i18n="intro"></div>
</section>

<section class="section">
    <h2 data-i18n="target_title"></h2>
    <div id="target-list"></div>
</section>

<section class="section">
    <h2 data-i18n="method_title"></h2>
    <div id="method-list"></div>
</section>

<section class="section center">
    <h2 data-i18n="notice_title"></h2>
    <p data-i18n="notice_desc"></p>
</section>

<section class="section center">
    <a href="mailto:onforum.org@gmail.com" data-i18n="cta"></a>
</section>

<div class="center">
    <a href="index.html" data-i18n="back"></a>
</div>

</div>

<script>

const content = {
title: { ko: "참여·문의", en: "Contact" },
subtitle: {
    ko: "구조를 함께 이해하고 싶은 분들을 위한 안내",
    en: "For those who seek structural understanding"
},
intro: {
    ko: "세상의 설명이 공허하게 느껴졌다면,<br><strong>구조를 제시합니다</strong>",
    en: "If explanations feel empty,<br><strong>we present structure</strong>"
},
target_title: {
    ko: "이런 분들에게 적합합니다",
    en: "Suitable for"
},
method_title: {
    ko: "공명의 시작",
    en: "Start of Resonance"
},
notice_title: {
    ko: "우리는 즉답을 제공하지 않습니다",
    en: "We do not provide quick answers"
},
notice_desc: {
    ko: "구조를 통해 스스로 보게 합니다",
    en: "We guide you to see through structure"
},
cta: {
    ko: "문의하기",
    en: "Contact Us"
},
back: {
    ko: "← 홈으로 돌아가기",
    en: "← Back to Home"
}
};

const targets = [
{
    ko: "원인과 구조를 끝까지 이해하고 싶은 분",
    en: "Those seeking deep structural understanding"
},
{
    ko: "정보 속에서 기준을 찾고 싶은 분",
    en: "Those seeking clarity in information"
},
{
    ko: "감정과 이성의 구조를 이해하고 싶은 분",
    en: "Understanding emotional and rational structures"
},
{
    ko: "문제를 구조적으로 해결하고 싶은 분",
    en: "Solving problems structurally"
}
];

const methods = [
{
    ko: "1. 관심 공유",
    en: "1. Share interest"
},
{
    ko: "2. 구조 진단",
    en: "2. Structural diagnosis"
},
{
    ko: "3. 공명 확인",
    en: "3. Confirm resonance"
}
];

function renderList(lang) {
    const targetEl = document.getElementById("target-list");
    targetEl.innerHTML = "";
    targets.forEach(t => {
        targetEl.innerHTML += `<div class="card">${t[lang]}</div>`;
    });

    const methodEl = document.getElementById("method-list");
    methodEl.innerHTML = "";
    methods.forEach(m => {
        methodEl.innerHTML += `<div class="card">${m[lang]}</div>`;
    });
}

function setLang(lang) {
    localStorage.setItem("lang", lang);

    document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.dataset.i18n;
        el.innerHTML = content[key][lang];
    });

    renderList(lang);

    document.getElementById("btn-ko").classList.toggle("active", lang === "ko");
    document.getElementById("btn-en").classList.toggle("active", lang === "en");
}

window.onload = function() {
    const lang = localStorage.getItem("lang") || "ko";
    setLang(lang);
};

</script>

</body>
</html>
