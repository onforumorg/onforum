<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ON-FORUM | Contact</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

<style>
body {
    font-family: 'Pretendard', sans-serif;
    margin: 0;
    background: #fff;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 60px 20px;
}

.lang-switch {
    position: fixed;
    top: 20px;
    right: 30px;
}

.lang-btn {
    border: none;
    background: none;
    cursor: pointer;
    font-weight: bold;
}

.lang-btn.active {
    border-bottom: 2px solid #000;
}

.section {
    margin-bottom: 60px;
}

.card {
    margin-bottom: 15px;
    padding: 15px;
    border: 1px solid #ddd;
    background: #f7f8fa;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-2px);
}

.center {
    text-align: center;
}
</style>
</head>

<body>

<nav class="lang-switch">
    <button id="btn-ko" class="lang-btn" onclick="setLang('ko')">KOR</button>
    <button id="btn-en" class="lang-btn" onclick="setLang('en')">ENG</button>
</nav>

<div class="container">

<header class="center">
    <h1 data-i18n="title"></h1>
    <p data-i18n="subtitle"></p>
</header>

<section class="section center">
    <div data-i18n="intro"></div>
</section>

<section class="section">
    <h2 data-i18n="target_title"></h2>
    <div id="target-list"></div>
</section>

<section class="section">
    <h2 data-i18n="method_title"></h2>
    <div id="method-list"></div>
</section>

<section class="section center">
    <h2 data-i18n="notice_title"></h2>
    <p data-i18n="notice_desc"></p>
</section>

<!-- 연구 참여 영역 시작 -->

<section class="section center">
    <h2 data-i18n="participation_title"></h2>
    <p data-i18n="participation_subtitle"></p>
</section>

<section class="section">
    <h2 data-i18n="field_title"></h2>
    <div id="field-list"></div>
</section>

<section class="section center">
    <h2 data-i18n="resonance_title"></h2>
    <div id="resonance-list"></div>
</section>

<section class="section center">
    <h2 data-i18n="process_title"></h2>
    <div id="process-list"></div>
</section>

<section class="section center">

    <p data-i18n="private_desc"></p>
</section>

<!-- 연구 참여 영역 끝 -->

<section class="section center">
    <a href="mailto:onforum.org@gmail.com" data-i18n="cta"></a>
</section>

<div class="center">
    <a href="index.html" data-i18n="back"></a>
</div>

</div>

},

},

    en: "Some research is gradually disclosed"
},

private_desc: {
    ko: "정리와 검증이 진행 중인 일부 구조는 제한적으로 공유됩니다",
    en: "Some structures under refinement are selectively shared"
},

    en: "Contact Us"
},

    ko: "← 홈으로 돌아가기",
    en: "← Back to Home"
}

};

const targets = [
{
    ko: "원인과 구조를 끝까지 이해하고 싶은 분",
    en: "Those seeking deep structural understanding"
},
{
    ko: "정보 속에서 기준을 찾고 싶은 분",
    en: "Those seeking clarity in information"
},
{
    ko: "감정과 이성의 구조를 이해하고 싶은 분",
    en: "Understanding emotional and rational structures"
},
{
    ko: "문제를 구조적으로 해결하고 싶은 분",
    en: "Solving problems structurally"
}
];

const methods = [
{
    ko: "1. 관심 공유",
    en: "1. Share Interest"
},
{
    ko: "2. 구조 진단",
    en: "2. Structural Diagnosis"
},
{
    ko: "3. 공명 확인",
    en: "3. Confirm Resonance"
}
];

const fields = [
{
    ko: "생각과 관점 제안",
    en: "Ideas and Perspectives"
},
{
    ko: "자료 및 사례 연결",
    en: "Research and References"
},
{
    ko: "번역 및 정리 참여",
    en: "Translation and Structuring"
},

    ko: "장기 연구 협력",
    en: "Long-term Collaboration"
}
];

const resonance = [
{
    ko: "빠른 결론보다 구조를 중시합니다",
    en: "Structure over quick conclusions"
},
{
    ko: "질문과 탐구의 지속성을 중요하게 봅니다",
    en: "Sustained inquiry matters"
},
{
    ko: "현실과 존재를 함께 바라보려 합니다",
    en: "Seeking reality and existence together"
}
];

const process = [
{
    ko: "1. 관심 공유",
    en: "1. Share Interest"
},
{
    ko: "2. 공명 확인",
    en: "2. Confirm Resonance"
},
{
    ko: "3. 구조 대화",
    en: "3. Structural Dialogue"
},
{
    ko: "4. 장기 협력 가능성",
    en: "4. Long-term Collaboration"
}
];

function renderList(lang) {

    const targetEl = document.getElementById("target-list");
    targetEl.innerHTML = "";
    targets.forEach(t => {
        targetEl.innerHTML += `<div class="card">${t[lang]}</div>`;
    });

    const methodEl = document.getElementById("method-list");
    methodEl.innerHTML = "";
    methods.forEach(m => {
        methodEl.innerHTML += `<div class="card">${m[lang]}</div>`;
    });

    const fieldEl = document.getElementById("field-list");
    fieldEl.innerHTML = "";
    fields.forEach(f => {
        fieldEl.innerHTML += `<div class="card">${f[lang]}</div>`;
    });

    const resonanceEl = document.getElementById("resonance-list");
    resonanceEl.innerHTML = "";
    resonance.forEach(r => {
        resonanceEl.innerHTML += `<div class="card">${r[lang]}</div>`;
    });

    const processEl = document.getElementById("process-list");
    processEl.innerHTML = "";
    process.forEach(p => {
        processEl.innerHTML += `<div class="card">${p[lang]}</div>`;
    });
}

function setLang(lang) {

    localStorage.setItem("lang", lang);

    document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.dataset.i18n;
        el.innerHTML = content[key][lang];
    });

    renderList(lang);

    document.getElementById("btn-ko").classList.toggle("active", lang === "ko");
    document.getElementById("btn-en").classList.toggle("active", lang === "en");
}

window.onload = function() {

    const lang = localStorage.getItem("lang") || "ko";
    setLang(lang);

};

</script>

</body>
</html>
