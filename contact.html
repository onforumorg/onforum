<!DOCTYPE html>

<style>
body {
    font-family: 'Pretendard', sans-serif;
    margin: 0;
    background: #fff;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 60px 20px;
}

.lang-switch {
    position: fixed;
    top: 20px;
    right: 30px;
}

.lang-btn {
    border: none;
    background: none;
    cursor: pointer;
    font-weight: bold;
}

.lang-btn.active {
    border-bottom: 2px solid #000;
}

.section {
    margin-bottom: 60px;
}

.card {
    margin-bottom: 20px;
    padding: 28px 24px;
    border: 1px solid #ddd;
    border-radius: 14px;
    background: #fff;
    box-shadow: 0 8px 24px rgba(0,0,0,.05);
    transition: all .25s ease;
}

.menu-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 14px 36px rgba(0,0,0,.10);
    background:#1a2a40;
    color:#fff;
}

.card-title{
    font-size:1.25rem;
    color:#1a2a40;
    transition:color .25s ease;
}

.card-desc{
    color:#666;
    line-height:1.8;
    transition:color .25s ease;
}

.menu-card:hover .card-title,
.menu-card:hover .card-desc{
    color:#fff;
}

.center {
    text-align: center;
}
    
</style>
</head>

<body>

<nav class="lang-switch">
    <button id="btn-ko" class="lang-btn" onclick="setLang('ko')">KOR</button>
    <button id="btn-en" class="lang-btn" onclick="setLang('en')">ENG</button>
</nav>

<div class="container">

    <a href="tel:05057997878" data-i18n="phone" style="color:#1a2a40;text-decoration:none;"></a>

<script>

const targets = [
{
    ko: "<strong class='card-title'>일반회원 가입하기</strong><br><br><span class='card-desc'>온포럼의 취지에 공감하며 함께 배우고, 대화와 탐구에 참여하는 기본 회원입니다.</span>",
    en: "Join as a General Member<br><small>Join ON-FORUM as a general member.</small>",
    link: "general-member.html"
},
{
    ko: "<strong class='card-title'>공진후원하기</strong><br><br><span class='card-desc'>온포럼의 연구와 비영리 운영을 지속적으로 후원합니다.</span>",
    en: "Support ON-FORUM<br><small>Support ON-FORUM's research and nonprofit activities.</small>",

    en: "A commitment to sustaining meaningful questions"

    ko: "연구와 비영리 운영의 지속 가능성",
    en: "Supporting the sustainability of research and nonprofit operations"
}
];

const process = [
{
    ko: "1. 원하는 참여 방법을 선택합니다.",
    en: "1. Choose your preferred way to get involved."
},
{
    ko: "2. 자신에게 맞는 참여 방식을 확인한 뒤 회원가입, 공진후원 또는 연구참여를 신청합니다.",
    en: "2. Choose the participation option that suits you, then apply for membership, support, or research participation."
},
{
    ko: "3. 온포럼과 함께 질문과 연구를 이어 갑니다.",
    en: "3. Continue asking meaningful questions and contributing to research with ON-FORUM."
},
{
    ko: "4. 모든 참여는 온포럼의 연구와 비영리 운영을 지속적으로 함께 이어가는 참여입니다.",
    en: "4. Every form of participation helps sustain ON-FORUM's research and nonprofit activities."
}
];

function renderList(lang) {

    const targetEl = document.getElementById("target-list");

targetEl.innerHTML = `
<div style="
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
">
${
targets.map(t => `
<div class="card menu-card"
     style="
     cursor:pointer;
     margin-bottom:0;
     background:#fdfaf3;
     border:1px solid #e9dfc9;
     "
     onmouseover="this.style.background='#1a2a40'; this.querySelector('.card-title').style.color='#fff'; this.querySelector('.card-desc').style.color='#fff';"
     onmouseout="this.style.background='#fdfaf3'; this.querySelector('.card-title').style.color='#1a2a40'; this.querySelector('.card-desc').style.color='#666';"
     onclick="location.href='${t.link}'">
     ${t[lang]}
</div>
`).join("")
}
</div>`;

    const resonanceEl = document.getElementById("resonance-list");
    resonanceEl.innerHTML = "";
    resonance.forEach(r => {
        resonanceEl.innerHTML += `<div class="card">${r[lang]}</div>`;
    });

    const processEl = document.getElementById("process-list");
    processEl.innerHTML = "";
    process.forEach(p => {
        processEl.innerHTML += `<div class="card">${p[lang]}</div>`;
    });
}

function setLang(lang) {

    localStorage.setItem("lang", lang);

   document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.dataset.i18n;

    if(content[key]){
        el.innerHTML = content[key][lang];
    }
});

    renderList(lang);

    document.getElementById("btn-ko").classList.toggle("active", lang === "ko");
    document.getElementById("btn-en").classList.toggle("active", lang === "en");
}

window.onload = function() {

    const lang = localStorage.getItem("lang") || "ko";
    setLang(lang);

};

</script>
