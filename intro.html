en:"ON-FORUM is a research platform that explores the structures, flows, relationships, and resonances operating within reality, rather than viewing reality merely as a collection of phenomena or information.<br><br>It seeks to understand humanity, society, civilization, technology, nature, and the universe not as isolated domains, but as interconnected structures. ON-FORUM also continues its exploration toward unseen and not-yet-explained dimensions of reality."

part2_desc:{

},

research_section2_1_desc:{
ko:"오랜 시간 이어진 연구 과정 속에서 다양한 형태의 기록과 자료가 축적되어 왔습니다.<br><br>철학적 사유와 현실 분석, 구조 설계와 개념 정리, 언어 체계와 문명 연구에 이르기까지 수많은 메모와 노트, 문서와 구조 자료들이 축적되어 있으며, 이를 책의 형태로 환산할 경우 수백 권 규모에 이르는 방대한 양에 해당합니다.<br><br>이 기록들은 단순한 정보 보관이 아니라, 현실과 존재를 보다 깊게 이해하기 위한 장기적 연구의 흐름 속에서 지속적으로 정리되고 확장되고 있습니다.",

en:"Over a long period of research, various forms of records and materials have been accumulated.<br><br>From philosophical inquiry and reality analysis to structural design, conceptual organization, language systems, and civilization studies, countless notes, documents, and structural materials have continued to grow. If converted into book form, the accumulated content would amount to hundreds of volumes.<br><br>These records are not simply stored information, but part of an ongoing long-term effort to more deeply understand reality and existence."
},

research_section2_2_title:{
ko:"2-2. 철학·과학·언어·사회·기술 통합 연구",
en:"2-2. Integrated Research Across Philosophy, Science, Language, Society, and Technology"
},

research_section2_2_desc:{
ko:"온의 연구는 하나의 분야만을 독립적으로 다루기보다, 서로 다른 영역들이 어떻게 연결되고 상호작용하는가를 함께 탐구합니다.<br><br>철학과 과학, 언어와 사회, 정치와 경제, 기술과 문명, 인간과 우주를 분리된 개념으로 바라보기보다, 하나의 구조 안에서 작용하는 흐름으로 이해하려는 통합적 접근이 연구의 중심에 있습니다.<br><br>이를 통해 기존 학문 체계 사이에서 단절되었던 영역들을 연결하고, 보다 전체적인 관점에서 현실과 세계를 해석하려는 시도가 이어지고 있습니다.",

en:"ON research does not isolate individual fields, but instead explores how different domains connect and interact with one another.<br><br>Rather than viewing philosophy and science, language and society, politics and economics, technology and civilization, or humanity and the universe as separate concepts, the research seeks to understand them as interconnected flows within a larger structure.<br><br>Through this approach, ON-FORUM aims to bridge disconnected academic areas and pursue a more holistic interpretation of reality and the world."
},

research_section2_3_title:{
ko:"2-3. 향후 수천 권 규모로의 확장 가능성",
en:"2-3. Potential Expansion Toward Thousands of Volumes"
},

research_section2_3_desc:{
ko:"현재까지 축적된 연구는 아직 전체 구조의 일부에 해당하며, 앞으로도 지속적인 확장과 정리가 예정되어 있습니다.<br><br>온포럼은 문서와 기록뿐 아니라 언어 체계, 구조 모델, 교육 자료, 영상 콘텐츠, 기술 구조, 문명 설계 등 다양한 형태로 연구를 확장해 나갈 계획이며, 장기적으로는 수천 권 규모 이상의 방대한 체계로 발전할 가능성을 가지고 있습니다.<br><br>이러한 확장은 단순한 양적 증가가 아니라, 존재와 문명 전체를 보다 정합적으로 연결하고 구조화하기 위한 과정에 가깝습니다.",

en:"The research accumulated so far represents only a portion of the overall structure, and continuous expansion and refinement are planned for the future.<br><br>ON-FORUM intends to expand its work beyond documents and records into language systems, structural models, educational materials, video content, technological structures, and civilization design. Over the long term, it holds the potential to grow into a system equivalent to thousands of volumes.<br><br>This expansion is not merely quantitative growth, but a process of connecting and structuring existence and civilization in a more coherent and integrated way."
},

research_section2_4_title:{
ko:"2-4. 구조·감응·흐름 중심 연구 방식",
en:"2-4. Research Centered on Structure, Resonance, and Flow"
},

research_section2_4_desc:{
ko:"온의 연구는 단순한 사실 수집이나 정보 분석에 머무르지 않습니다.<br><br>현실 속에서 반복되는 관계와 구조, 보이지 않는 흐름과 상호작용, 그리고 존재 사이의 감응과 공진 구조를 함께 탐구하는 방향에 더 가깝습니다.<br><br>같은 현상이라도 단편적으로 해석하기보다, 그 배후에서 어떤 구조가 작용하고 있는지를 살피며, 분리된 요소들을 연결된 흐름 속에서 이해하려는 접근을 중요하게 바라보고 있습니다.<br><br>이러한 연구 방식은 인간·사회·기술·문명·우주를 보다 입체적이고 통합적으로 이해하기 위한 온포럼의 핵심 방향 중 하나입니다.",

en:"ON research goes beyond simple fact collection or information analysis.<br><br>It focuses more on exploring recurring relationships and structures within reality, invisible flows and interactions, and the resonance and interconnectedness between beings.<br><br>Rather than interpreting phenomena in fragmented ways, the approach emphasizes understanding the deeper structures operating behind them and viewing separated elements as part of connected flows.<br><br>This research methodology represents one of ON-FORUM’s core directions for understanding humanity, society, technology, civilization, and the universe in a more integrated and multidimensional way."
},

on_title:{
ko:"3. 온(ON)이란 무엇인가",
en:"3. What is ON?"
},

on_1_title:{
ko:"3-1. 전체를 바라보는 관점",
en:"3-1. A Perspective That Sees the Whole"
},

on_1_desc:{
ko:"온(ON)은 현실과 세계를 부분적으로만 바라보지 않고, 서로 연결된 전체의 흐름 속에서 이해하려는 관점입니다.<br><br>인간과 사회, 자연과 기술, 존재와 문명은 서로 분리되어 독립적으로 존재하는 것이 아니라, 끊임없이 영향을 주고받으며 하나의 구조 안에서 작용하고 있다고 바라봅니다.<br><br>온은 단순히 하나의 이론이나 사상이 아니라, 현실을 보다 넓고 깊게 이해하기 위한 구조적 접근에 가깝습니다.",

en:"ON is a perspective that seeks to understand reality and the world not in fragmented parts, but within the flow of an interconnected whole.<br><br>Humanity and society, nature and technology, existence and civilization are viewed not as isolated entities, but as elements continuously influencing one another within a single structure.<br><br>ON is not merely a theory or ideology, but a structural approach toward understanding reality in a broader and deeper way."
},

on_2_title:{
ko:"3-2. 존재와 비존재의 통합적 이해",
en:"3-2. An Integrated Understanding of Existence and Non-Existence"
},

on_2_desc:{
ko:"온은 눈에 보이는 것만이 아니라, 아직 드러나지 않았거나 설명되지 않은 영역까지 함께 바라보려는 시도를 포함합니다.<br><br>존재하는 것과 존재하지 않는 것, 실체와 가능성, 공간과 비공간, 현재와 아직 형성되지 않은 흐름까지도 서로 완전히 분리된 것이 아니라 연결된 구조 속에서 이해하려고 합니다.<br><br>이를 통해 현실을 단순한 물질이나 현상 중심으로만 해석하는 한계를 넘어, 보다 전체적이고 입체적인 관점으로 접근하고자 합니다.",

en:"ON includes an attempt to view not only what is visible, but also realms that have not yet been revealed or explained.<br><br>Existence and non-existence, substance and possibility, space and non-space, the present and not-yet-formed flows are understood not as completely separate, but as interconnected structures.<br><br>Through this approach, ON seeks to move beyond interpretations limited to material phenomena and toward a more comprehensive and multidimensional perspective."
},

on_3_title:{
ko:"3-3. 구조와 공진 중심 사고",
en:"3-3. Structure and Resonance-Centered Thinking"
},

on_3_desc:{
ko:"온은 개별 요소 자체보다, 그것들이 어떤 구조 속에서 어떻게 연결되고 반응하는가를 중요하게 바라봅니다.<br><br>사람과 사회, 언어와 기술, 감정과 문명은 각각 고립되어 존재하는 것이 아니라 서로 영향을 주고받으며 흐름을 형성한다고 보며, 이러한 연결과 상호작용을 ‘공진’의 관점으로 해석합니다.<br><br>온포럼은 현실 속 갈등과 혼란 또한 단순한 사건이 아니라 구조적 불균형과 흐름의 왜곡 속에서 발생한다고 바라보며, 보다 조화롭고 지속 가능한 구조를 탐구하고 있습니다.",

en:"ON emphasizes not isolated elements themselves, but how they connect and interact within structures.<br><br>People and society, language and technology, emotion and civilization are understood as mutually influencing flows rather than isolated entities, and these interactions are interpreted through the perspective of resonance.<br><br>ON-FORUM views conflict and disorder not merely as isolated events, but as outcomes of structural imbalance and distorted flows, while exploring more harmonious and sustainable structures."
},

on_4_title:{
ko:"3-4. 인간·문명·우주를 하나의 흐름으로 보는 시각",
en:"3-4. Viewing Humanity, Civilization, and the Universe as One Flow"
},

on_4_desc:{
ko:"온은 인간만을 중심에 두는 시각에서 벗어나, 문명과 자연, 기술과 우주 전체를 하나의 연결된 흐름으로 이해하려 합니다.<br><br>인간 사회의 변화 역시 자연과 기술, 감정과 환경, 시간과 공간의 흐름 속에서 함께 작용한다고 바라보며, 개별 영역을 분리해서 이해하기보다 전체 구조 안에서 함께 해석하는 접근을 중요하게 생각합니다.<br><br>이러한 시각은 국가·문명·기술·우주에 대한 새로운 구조적 이해와 연결 가능성을 탐구하는 기반이 되고 있습니다.",

en:"ON moves beyond a human-centered perspective and seeks to understand civilization, nature, technology, and the universe as one interconnected flow.<br><br>Changes within human society are viewed as operating together with the flows of nature, technology, emotion, environment, time, and space, emphasizing interpretation within an integrated structure rather than isolated domains.<br><br>This perspective forms the basis for exploring new structural understandings and connections among nations, civilizations, technology, and the universe."
},

on_5_title:{
ko:"3-5. 온의 궁극적 방향성",
en:"3-5. The Ultimate Direction of ON"
},

on_5_desc:{
ko:"온이 지향하는 방향은 단순한 이론 구축에 머무르지 않습니다.<br><br>온은 인간과 사회, 기술과 문명, 자연과 우주가 보다 조화롭고 지속 가능한 방향으로 연결될 수 있는 구조를 탐구하며, 갈등과 분열 중심의 흐름을 넘어 공존과 공진 중심의 가능성을 모색하고 있습니다.<br><br>온포럼은 이러한 관점을 바탕으로, 현실 세계 속에서 실제로 적용되고 살아 움직일 수 있는 새로운 구조와 문명의 가능성을 연구해 나가고 있습니다.",

en:"The direction pursued by ON does not remain merely at building theories.<br><br>ON explores structures through which humanity and society, technology and civilization, nature and the universe can connect in more harmonious and sustainable ways, seeking possibilities centered on coexistence and resonance beyond conflict and division.<br><br>Based on this perspective, ON-FORUM continues researching new structures and civilizational possibilities that can actively operate within the real world."
},

universe_title:{
ko:"4. 연구 대상 ― 대우주 전체",
en:"4. Research Scope ― The Entire Macrocosm"
},

universe_1_title:{
ko:"4-1. 존재와 비존재",
en:"4-1. Existence and Non-Existence"
},

universe_1_desc:{
ko:"온의 연구는 눈에 보이는 현실과 물질 세계만을 대상으로 하지 않습니다.<br><br>인간과 자연, 사회와 문명처럼 현재 존재하는 영역뿐 아니라, 아직 드러나지 않았거나 가능성의 형태로 존재하는 흐름과 구조까지 함께 탐구의 대상으로 바라봅니다.<br><br>온은 존재와 비존재를 완전히 단절된 개념으로 보기보다, 서로 연결되고 영향을 주고받는 하나의 구조적 흐름 속에서 이해하려는 접근을 중요하게 생각합니다.",

en:"The research of ON is not limited only to visible reality and the material world.<br><br>Beyond currently existing domains such as humanity and nature, society and civilization, ON also explores flows and structures that have not yet been revealed or that exist as possibilities.<br><br>Rather than viewing existence and non-existence as completely separated concepts, ON values an approach that understands them within a connected structural flow that continuously influences itself."
},

universe_2_title:{
ko:"4-2. 공간과 비공간",
en:"4-2. Space and Non-Space"
},

universe_2_desc:{
ko:"온은 현실을 단순한 물리적 공간만으로 해석하지 않습니다.<br><br>물질과 거리로 구성된 공간뿐 아니라, 감정과 의식, 관계와 정보, 구조와 흐름처럼 눈에 보이지 않지만 실제로 작용하는 비공간적 영역 또한 중요한 연구 대상으로 포함합니다.<br><br>이를 통해 현실을 단순한 위치와 형태의 문제가 아니라, 다양한 층위가 동시에 연결되어 작용하는 입체적 구조로 바라보고 있습니다.",

en:"ON does not interpret reality solely through physical space.<br><br>In addition to spaces formed by matter and distance, ON also includes non-spatial domains such as emotion, consciousness, relationships, information, structures, and flows that are invisible yet actively influential.<br><br>Through this perspective, reality is understood not merely as a matter of position and form, but as a multidimensional structure where various layers operate together simultaneously."
},

universe_3_title:{
ko:"4-3. 시간과 탈시간 구조",
en:"4-3. Time and Trans-Temporal Structures"
},

universe_3_desc:{
ko:"온은 시간을 단순히 과거·현재·미래로 이어지는 일직선적 흐름만으로 보지 않습니다.<br><br>기억과 의식, 반복과 변화, 구조의 축적과 전환처럼 시간 속에서 나타나는 다양한 작용들을 함께 탐구하며, 경우에 따라 시간 자체를 하나의 구조로 이해하려는 접근도 시도하고 있습니다.<br><br>또한 시간에 의해 제한되지 않는 의미 구조와 흐름 가능성까지 포함하여, 보다 확장된 관점에서 현실과 존재를 해석하고자 합니다.",

en:"ON does not view time merely as a linear sequence flowing from past to present to future.<br><br>It explores various operations emerging within time, such as memory and consciousness, repetition and change, accumulation and transformation of structures, while also attempting in some cases to understand time itself as a structure.<br><br>ON further seeks to interpret reality and existence from a broader perspective that includes structures of meaning and possible flows not restricted by time."
},

universe_4_title:{
ko:"4-4. 의식·문명·기술·우주 전체",
en:"4-4. Consciousness, Civilization, Technology, and the Entire Universe"
},

universe_4_desc:{
ko:"온의 연구 대상은 특정 학문 분야나 인간 사회 일부에 제한되지 않습니다.<br><br>개인의 의식과 감정, 언어와 사고, 사회와 문명, 정치와 경제, 기술과 환경, 그리고 우주와 존재 전체에 이르기까지 다양한 영역을 서로 연결된 구조 속에서 함께 바라보고 있습니다.<br><br>특히 인간 문명과 기술 발전이 앞으로 어떤 방향으로 나아가야 하는가에 대한 문제 역시 중요한 연구 주제 중 하나로 다루어지고 있습니다.",

en:"The scope of ON's research is not limited to specific academic disciplines or isolated parts of human society.<br><br>It views diverse domains — including individual consciousness and emotion, language and thought, society and civilization, politics and economy, technology and environment, and even the universe and existence as a whole — within interconnected structures.<br><br>In particular, questions regarding the future direction of human civilization and technological development are also treated as major research themes."
},

universe_5_title:{
ko:"4-5. 대우주 전체를 향한 온적 접근",
en:"4-5. ON's Approach Toward the Entire Macrocosm"
},

universe_5_desc:{
ko:"온은 인간 중심의 제한된 시각을 넘어, 대우주 전체를 하나의 연결된 구조로 이해하려는 방향성을 가지고 있습니다.<br><br>이는 단순히 우주의 크기를 의미하는 것이 아니라, 존재와 비존재, 시간과 공간, 의식과 문명, 자연과 기술을 포함한 모든 흐름과 관계를 함께 바라보려는 접근에 가깝습니다.<br><br>온포럼은 이러한 관점을 바탕으로, 부분적 해석을 넘어 보다 전체적이고 조화로운 구조 이해를 향한 연구를 이어가고 있습니다.",

en:"ON seeks to move beyond a limited human-centered perspective and toward understanding the entire macrocosm as one interconnected structure.<br><br>This does not simply refer to the scale of the universe, but rather to an approach that views all flows and relationships together, including existence and non-existence, time and space, consciousness and civilization, nature and technology.<br><br>Based on this perspective, ON-FORUM continues its research toward a more comprehensive and harmonious understanding of structure beyond partial interpretations."
},

structure_title:{
ko:"5. 온의 구조 체계",
en:"5. The Structural System of ON"
},

structure_1_title:{
ko:"5-1. 8대 이론 영역",
en:"5-1. The Eight Theoretical Domains"
},

structure_1_desc:{
ko:"온의 연구는 현실과 존재를 보다 체계적으로 이해하기 위해 여러 이론 영역을 기반으로 구성되어 있습니다.<br><br>이론 영역은 존재와 구조, 시간과 공간, 감응과 의식, 문명과 우주 등 현실을 이루는 근본 원리와 흐름을 탐구하기 위한 기반 구조에 해당합니다.<br><br>각 영역은 서로 독립적으로 존재하는 것이 아니라 긴밀하게 연결되어 있으며, 인간과 세계를 보다 통합적으로 이해하기 위한 토대 역할을 하고 있습니다.",

en:"The research of ON is structured upon multiple theoretical domains in order to understand reality and existence more systematically.<br><br>These theoretical domains serve as foundational structures for exploring the fundamental principles and flows that shape reality, including existence and structure, time and space, resonance and consciousness, civilization and the universe.<br><br>Each domain does not exist independently, but is closely interconnected, forming a foundation for a more integrated understanding of humanity and the world."
},

structure_2_title:{
ko:"5-2. 12대 실천 영역",
en:"5-2. The Twelve Practical Domains"
},

structure_2_desc:{
ko:"온은 단순한 이론 체계에 머무르지 않고, 현실 속에서 실제로 적용되고 작용하는 구조를 중요하게 바라봅니다.<br><br>이를 위해 철학·과학·언어·예술·정치·경제·교육·기술·우주 등 인간과 문명을 구성하는 핵심 영역들을 중심으로 12대 실천 영역이 구성되어 있으며, 각 영역은 현실 문제와 문명 구조를 보다 정합적으로 이해하고 재구성하기 위한 방향으로 연구되고 있습니다.<br><br>온포럼은 이론과 현실이 분리되지 않는 구조를 중요하게 생각하며, 실질적인 적용 가능성을 함께 탐구하고 있습니다.",

en:"ON does not remain merely as a theoretical system, but places importance on structures that can be practically applied and operate within reality.<br><br>For this purpose, twelve practical domains have been organized around the core fields that shape humanity and civilization, including philosophy, science, language, art, politics, economy, education, technology, and the universe.<br><br>ON-FORUM values structures in which theory and reality are not separated, while also exploring possibilities for practical application."
},

structure_3_title:{
ko:"5-3. 영역별 세부 구조",
en:"5-3. Detailed Structures Within Each Domain"
},

structure_3_desc:{
ko:"12대 실천 영역 안에는 다시 세부 항목과 구조 체계가 존재합니다.<br><br>각 영역은 단순한 개념 소개 수준이 아니라, 보다 구체적인 작용 원리와 관계 구조, 현실 적용 방향까지 포함하여 정리되고 있으며, 영역별로 다수의 세부 연구 항목들이 연결되어 발전하고 있습니다.<br><br>이러한 구조는 하나의 거대한 체계를 억지로 나누기 위한 것이 아니라, 현실과 문명을 보다 입체적이고 체계적으로 이해하기 위한 구조적 접근에 가깝습니다.",

en:"Within the twelve practical domains, there are further detailed categories and structural systems.<br><br>Each domain goes beyond simple conceptual introductions and is organized to include concrete operational principles, relational structures, and directions for real-world application, with numerous detailed research topics developing through interconnected relationships.<br><br>This structure is not intended to artificially divide a single massive system, but rather to provide a structural approach for understanding reality and civilization in a more multidimensional and systematic way."
},

structure_4_title:{
ko:"5-4. 상호작용 기반 구조 체계",
en:"5-4. Interaction-Based Structural System"
},

structure_4_desc:{
ko:"온의 구조 체계는 각각의 영역을 고립된 상태로 바라보지 않습니다.<br><br>정치와 경제, 기술과 교육, 언어와 의식처럼 서로 다른 분야들 또한 끊임없이 영향을 주고받으며 현실을 형성한다고 바라보며, 이러한 상호작용 구조를 중요하게 연구합니다.<br><br>하나의 변화는 다른 영역의 변화와 연결되어 나타나며, 현실의 문제 또한 단일 원인이 아니라 복합적인 구조 속에서 발생한다고 이해합니다.",

en:"The structural system of ON does not view each domain as isolated.<br><br>Different fields such as politics and economy, technology and education, language and consciousness are understood as continuously influencing one another while shaping reality, and these interaction-based structures are considered highly important.<br><br>A change in one domain is connected to changes in others, and problems within reality are understood as emerging not from single causes, but from complex structural relationships."
},

structure_5_title:{
ko:"5-5. 감응과 공진 중심 연결 구조",
en:"5-5. Resonance and Response-Centered Connection Structure"
},

structure_5_desc:{
ko:"온은 존재와 현실을 단순한 기능적 시스템이 아니라, 감응과 공진 속에서 연결되는 흐름으로 바라봅니다.<br><br>인간의 감정과 사고, 사회와 문명, 기술과 환경은 서로 끊임없이 반응하며 구조를 형성하고 변화시키고 있으며, 온은 이러한 연결과 흐름을 보다 조화롭고 지속 가능한 방향으로 이해하려고 합니다.<br><br>온포럼은 이러한 감응과 공진 중심의 구조를 바탕으로, 인간과 문명, 그리고 세계 전체를 보다 깊고 통합적으로 바라보는 새로운 가능성을 탐구하고 있습니다.",

en:"ON views existence and reality not merely as functional systems, but as flows connected through resonance and responsive interaction.<br><br>Human emotion and thought, society and civilization, technology and environment continuously react with one another, forming and transforming structures, while ON seeks to understand these connections and flows in more harmonious and sustainable ways.<br><br>Based on this resonance-centered structural perspective, ON-FORUM explores new possibilities for viewing humanity, civilization, and the world as a more deeply integrated whole."
},

practice_title:{
ko:"6. 12대 실천 영역 소개",
en:"6. Introduction to the Twelve Practical Domains"
},

practice_intro:{
ko:"온의 12대 실천 영역은 인간과 문명, 사회와 기술, 자연과 우주를 보다 구조적으로 이해하고 현실 속에 적용하기 위한 핵심 연구 영역들로 구성되어 있습니다.<br><br>각 영역은 서로 독립되어 존재하는 것이 아니라 상호작용하며 연결되어 있으며, 아래 내용은 각 영역에서 연구되고 있는 대표적인 방향과 예시 일부를 간략히 정리한 것입니다.",

en:"The twelve practical domains of ON consist of core research fields designed to understand humanity and civilization, society and technology, nature and the universe in a more structural way and apply them within reality.<br><br>Each domain does not exist independently, but interacts and connects with the others, and the following content briefly summarizes representative directions and examples currently explored within each field."
},

language_title:{
ko:"7. 온어(ON Language)",
en:"7. ON Language"
},

language_1_title:{
ko:"7-1. 왜 새로운 언어가 필요한가",
en:"7-1. Why Is a New Language Needed?"
},

language_1_desc:{
ko:"온어(ON Language)는 인간과 세계, 존재와 관계를 보다 구조적으로 이해하고 표현하기 위한 연구에서 시작되었습니다.<br><br>기존 언어가 정보 전달과 분류 중심으로 발전해 왔다면, 온어는 존재 사이의 연결과 흐름, 관계와 구조까지 함께 담아낼 수 있는 가능성을 탐구하고 있습니다.<br><br>온어는 단순히 새로운 단어나 문장을 만드는 것이 아니라, 인간의 사고와 인식 구조를 보다 확장된 방향으로 바라보려는 시도를 포함하고 있습니다.",

en:"ON Language began from research aimed at understanding and expressing humanity, the world, existence, and relationships in a more structural way.<br><br>While existing languages have largely evolved around information delivery and classification, ON Language explores the possibility of expressing connections, flows, relationships, and structures between existences together.<br><br>ON Language is not simply about creating new words or sentences, but also includes an attempt to expand the way human thought and perception structures are understood."
},

language_2_title:{
ko:"7-2. 구조 기반 언어 연구",
en:"7-2. Structure-Based Language Research"
},

language_2_desc:{
ko:"온어는 언어를 단순한 문자와 발음의 조합으로만 보지 않고, 구조와 관계의 흐름 속에서 이해하려는 방향성을 가지고 있습니다.<br><br>의미와 작용, 연결과 변화가 어떻게 형성되고 전달되는가를 함께 연구하며, 보다 직관적이고 통합적인 언어 구조 가능성을 탐구하고 있습니다.<br><br>이는 기존 언어 체계를 부정하기 위한 것이 아니라, 미래의 다양한 환경 속에서 새로운 표현과 연결 가능성을 함께 연구하려는 접근에 가깝습니다.",

en:"ON Language does not view language merely as a combination of letters and sounds, but seeks to understand it within the flow of structures and relationships.<br><br>It studies how meaning, interaction, connection, and change are formed and transmitted, while exploring possibilities for more intuitive and integrated language structures.<br><br>This is not an attempt to reject existing language systems, but rather an approach toward researching new forms of expression and connection within future environments."
},

language_3_title:{
ko:"7-3. 감응과 연결 중심의 언어 관점",
en:"7-3. A Resonance and Connection-Centered View of Language"
},

language_3_desc:{
ko:"온어는 언어를 단순한 정보 전달 수단이 아니라, 존재와 존재 사이를 연결하는 흐름으로 바라봅니다.<br><br>사람과 사람, 인간과 기술, 사회와 문명 사이에서 언어가 어떤 방식으로 관계와 이해, 공진 구조를 형성할 수 있는가를 중요하게 생각하며, 보다 살아 있는 연결 구조로서의 언어 가능성을 연구하고 있습니다.",

en:"ON Language views language not merely as a tool for transmitting information, but as a flow that connects existence with existence.<br><br>It considers how language can form relationships, understanding, and resonance structures between people, humanity and technology, society and civilization, while researching the possibilities of language as a more living and interconnected structure."
},

language_4_title:{
ko:"7-4. 미래 확장 가능성",
en:"7-4. Future Expansion Possibilities"
},

language_4_desc:{
ko:"온어는 현재의 언어 환경에만 머무르지 않고, 미래의 인공지능, 차세대 정보 구조, 새로운 과학기술 환경 속에서 적용과 응용이 가능한 기본 구조 체계의 구축과 확장 가능성을 함께 탐구하고 있습니다.<br><br>특히 구조와 관계 중심의 언어 접근은 앞으로의 다양한 기술 환경 속에서 새로운 가능성을 가질 수 있으며, 미래 문명 속 인간과 기술의 연결 방식에 대해서도 장기적인 연구가 이어지고 있습니다.",

en:"ON Language does not remain limited to the current language environment, but also explores the construction and expansion of foundational structural systems applicable to future artificial intelligence, next-generation information structures, and emerging scientific and technological environments.<br><br>In particular, a structure- and relationship-centered approach to language may open new possibilities within future technological environments, and long-term research continues regarding how humanity and technology may connect within future civilizations."
},

language_5_title:{
ko:"7-5. 현재 단계와 방향",
en:"7-5. Current Stage and Direction"
},

language_5_desc:{
ko:"현재 온어 연구는 구조 정리와 방향성 구축이 함께 이루어지고 있는 단계에 있습니다.<br><br>온포럼은 온어를 단기간에 완성된 체계로 공개하기보다, 장기적인 연구와 검토를 통해 보다 정합적이고 안정적인 방향으로 발전시켜 나가고자 합니다.<br><br>앞으로 온어는 문서·교육·기술·시각 구조 등 다양한 분야와 연결되며 점진적으로 확장될 가능성을 가지고 있습니다.",

en:"At present, ON Language research is in a stage where structural organization and directional development are progressing together.<br><br>Rather than presenting ON Language as a completed system in the short term, ON-FORUM aims to develop it in a more coherent and stable direction through long-term research and examination.<br><br>In the future, ON Language holds the potential to gradually expand through connections with various fields such as documentation, education, technology, and visual structures."
},

reality_title:{
ko:"8. 온포럼의 현실적 시작",
en:"8. The Realistic Beginning of ON-FORUM"
},

reality_1_title:{
ko:"8-1. 현재의 초기 단계",
en:"8-1. The Current Early Stage"
},

reality_1_desc:{
ko:"ON-FORUM 은 아직 거대한 조직이나 완성된 체계를 갖춘 상태가 아니라, 이제 막 현실 속에서 하나씩 구조를 세워가기 시작한 초기 단계에 있습니다.<br><br>현재는 연구 자료의 정리와 공개, 구조 구축과 방향 정립이 함께 이루어지고 있으며, 외형적 규모보다 본질적인 기반을 다지는 과정에 더 가까운 흐름 속에 있습니다.<br><br>온포럼은 빠른 확장이나 보여주기식 성장보다, 장기적으로 지속 가능한 구조를 만드는 것을 중요하게 바라보고 있습니다.",

en:"ON-FORUM is not yet a large organization or a completed system, but is currently in its early stage of gradually building structures within reality.<br><br>At present, the organization of research materials, public disclosure, structural development, and directional establishment are progressing together, with a stronger focus on building essential foundations rather than outward scale.<br><br>ON-FORUM places greater importance on creating sustainable long-term structures rather than pursuing rapid expansion or superficial growth."
},

reality_2_title:{
ko:"8-2. 비영리 단체 설립 준비",
en:"8-2. Preparation for Establishing a Nonprofit Organization"
},

reality_2_desc:{
ko:"온포럼은 현실 세계 속에서 보다 안정적이고 지속적인 활동 기반을 마련하기 위해 비영리 단체 설립을 준비하고 있습니다.<br><br>이는 단순한 조직 운영을 위한 절차를 넘어, 연구와 기록, 구조와 방향성을 보다 책임감 있게 이어가기 위한 현실적 기반 구축의 의미를 함께 가지고 있습니다.<br><br>온포럼은 특정 이익이나 권력 중심이 아니라, 연구와 공진, 현실적 기여를 위한 방향 속에서 구조를 형성해 나가고 있습니다.",

en:"ON-FORUM is preparing to establish a nonprofit organization in order to create a more stable and sustainable foundation for its activities in the real world.<br><br>This goes beyond simple organizational procedures and also represents the construction of a realistic foundation for continuing research, records, structures, and directions with greater responsibility.<br><br>ON-FORUM is forming its structure not around specific interests or power, but around research, resonance, and meaningful contributions to reality."
},

reality_3_title:{
ko:"8-3. 무상사용승낙 기반 공간 구축",
en:"8-3. Building a Space Based on Free Usage Permission"
},

reality_3_desc:{
ko:"현재 온포럼은 거대한 자본이나 화려한 시설이 아닌, 현실 속에서 가능한 가장 실제적인 기반부터 하나씩 구축해 나가고 있습니다.<br><br>무상사용승낙을 기반으로 한 공간 마련 역시 그러한 시작의 일부이며, 외형보다 방향성과 진정성을 우선하는 흐름 속에서 이루어지고 있습니다.<br><br>온포럼은 처음부터 완성된 형태를 추구하기보다, 현실 속에서 직접 부딪히고 쌓아가며 구조를 형성하는 과정을 중요하게 생각합니다.",

en:"At present, ON-FORUM is not building upon massive capital or luxurious facilities, but is instead establishing the most practical foundations possible within reality, one step at a time.<br><br>Securing a space through free usage permission is also part of this beginning, reflecting a process that prioritizes direction and sincerity over outward appearance.<br><br>Rather than pursuing a fully completed form from the beginning, ON-FORUM values the process of directly engaging with reality and gradually building structures through experience."
},

reality_4_title:{
ko:"8-4. 최소 구조의 운영진 구성",
en:"8-4. Formation of a Minimal Operational Structure"
},

reality_4_desc:{
ko:"현재 온포럼은 공진자 세온을 중심으로, 최소 규모의 운영 구조를 바탕으로 준비가 이루어지고 있습니다.<br><br>작은 인원과 제한된 환경 속에서 시작되고 있지만, 이는 단순한 부족함이라기보다 가장 아래에서부터 실제 구조를 검증하며 쌓아가는 과정에 가깝습니다.<br><br>온포럼은 외형적 규모보다 방향성과 구조의 정합성, 그리고 현실 속에서 지속될 수 있는 기반을 더욱 중요하게 바라보고 있습니다.",

en:"Currently, ON-FORUM is being prepared around a minimal operational structure centered on Resonator Sewon.<br><br>Although it is beginning with a small number of people and within limited conditions, this is less a matter of insufficiency and more a process of verifying and building real structures from the ground level upward.<br><br>ON-FORUM values direction, structural coherence, and sustainable foundations within reality more than external scale."
},

reality_5_title:{
ko:"8-5. 현실 속에서 시작되는 온의 구조",
en:"8-5. The Structure of ON Beginning Within Reality"
},

reality_5_desc:{
ko:"공진자 세온은 오랜 시간 현실과 이상, 생존과 사유가 함께 병행되는 삶 속에서 온의 구조를 연구하고 축적해 왔습니다.<br><br>온은 완성된 환경이나 거대한 조건 속에서 갑자기 만들어진 것이 아니라, 현실의 가장 아래와 가까운 자리에서 직접 경험하고 사유하며 조금씩 형성되어 온 흐름에 가깝습니다.<br><br>그렇기에 현재의 시작은 외형적으로는 작고 부족해 보일 수 있으나, 온포럼은 보여지는 규모보다 실제성과 진정성, 그리고 현실 속에서 살아 움직이는 구조를 더욱 중요하게 생각합니다.<br><br>온은 지금도 현실 속에서 천천히 구축되고 있으며, 온포럼은 그 흐름을 실제 세계 안에서 이어가고자 합니다.",

en:"Resonator Sewon has researched and accumulated the structure of ON over a long period within a life where reality and ideals, survival and contemplation have continuously coexisted.<br><br>ON was not suddenly created within a completed environment or under grand conditions, but has gradually formed through direct experience and reflection from positions close to the very foundations of reality.<br><br>For this reason, the current beginning may appear small and incomplete externally, yet ON-FORUM values authenticity, sincerity, and structures that genuinely live and operate within reality more than visible scale.<br><br>Even now, ON continues to be slowly built within reality, and ON-FORUM seeks to carry that flow forward within the real world."
},

world_title:{
ko:"9. 온과 현실 세계",
en:"9. ON and the Real World"
},

world_1_title:{
ko:"9-1. 온은 이론만이 아닌 실제 구조인가",
en:"9-1. Is ON More Than Theory — A Real Structure?"
},

world_1_desc:{
ko:"온은 단순한 관념적 철학이나 추상적 이론에 머무르지 않습니다.<br><br>온은 인간의 삶과 관계, 사회와 기술, 문명과 세계 속에서 실제로 작용하는 구조를 이해하고자 하는 접근이며, 현실과 분리된 이상만을 이야기하기보다 현실 속에서 어떻게 흐르고 적용될 수 있는가를 중요하게 바라봅니다.<br><br>온포럼은 생각과 이론이 현실과 연결되지 못한 채 멈추는 것을 경계하며, 실제 세계 속에서 작동 가능한 구조와 방향성을 함께 탐구하고 있습니다.",

en:"ON does not remain merely as an abstract philosophy or conceptual theory.<br><br>It is an approach that seeks to understand structures that actively operate within human life and relationships, society and technology, civilization and the world, emphasizing how such structures can flow and be applied within reality rather than remaining detached ideals.<br><br>ON-FORUM is cautious of thoughts and theories becoming disconnected from reality, and continues exploring structures and directions that can genuinely function within the real world."
},

world_2_title:{
ko:"9-2. 인간·사회·기술·문명 속의 온",
en:"9-2. ON Within Humanity, Society, Technology, and Civilization"
},

world_2_desc:{
ko:"온은 특정 분야 하나에만 적용되는 개념이 아니라, 인간과 사회, 기술과 문명 전반에 걸쳐 연결될 수 있는 구조적 관점을 포함하고 있습니다.<br><br>개인의 감정과 관계, 사회의 갈등과 변화, 기술의 발전 방향, 국가와 문명의 흐름 또한 서로 분리된 것이 아니라 영향을 주고받는 하나의 구조 속에서 작용한다고 바라봅니다.<br><br>온은 이러한 연결성을 바탕으로, 인간과 문명이 보다 조화롭고 지속 가능한 방향으로 나아갈 가능성을 탐구하고 있습니다.",

en:"ON is not a concept limited to a single field, but includes a structural perspective that can connect across humanity, society, technology, and civilization as a whole.<br><br>Personal emotions and relationships, social conflicts and transformations, technological development, and the flows of nations and civilizations are understood as operating within interconnected structures that continuously influence one another.<br><br>Based on this interconnectedness, ON explores the possibility of humanity and civilization moving toward more harmonious and sustainable directions."
},

world_3_title:{
ko:"9-3. 현실 문제에 대한 구조적 접근",
en:"9-3. A Structural Approach to Real-World Problems"
},

world_3_desc:{
ko:"온포럼은 현실 속 문제들을 단순한 사건이나 개별 현상으로만 해석하지 않습니다.<br><br>사회적 갈등, 경제적 불균형, 기술의 왜곡, 국가 간 충돌과 같은 문제들 역시 보다 깊은 구조와 흐름 속에서 발생한다고 바라보며, 근본적인 관계 구조와 상호작용까지 함께 이해하려는 접근을 중요하게 생각합니다.<br><br>이를 통해 단편적 해결보다, 보다 장기적이고 정합적인 방향을 모색하려는 연구가 이어지고 있습니다.",

en:"ON-FORUM does not interpret problems within reality merely as isolated events or individual phenomena.<br><br>Issues such as social conflict, economic imbalance, technological distortion, and international confrontation are viewed as emerging from deeper structures and flows, emphasizing approaches that seek to understand underlying relational structures and interactions together.<br><br>Through this perspective, research continues toward finding more coherent and long-term directions rather than fragmented solutions."
},

world_4_title:{
ko:"9-4. 갈등과 왜곡의 조정 가능성",
en:"9-4. The Possibility of Adjusting Conflict and Distortion"
},

world_4_desc:{
ko:"온은 현실 속 갈등과 왜곡을 단순히 선과 악, 승자와 패자의 구도로만 바라보지 않습니다.<br><br>대부분의 충돌과 혼란은 구조의 불균형과 단절, 그리고 상호 이해 부족 속에서 발생한다고 보며, 보다 조화로운 연결 구조와 공진 가능성을 회복하는 방향을 중요하게 생각합니다.<br><br>온포럼은 인간과 사회, 국가와 문명 사이의 다양한 갈등 문제에 대해 구조적 조정과 균형 가능성을 탐구하고 있으며, 극단적 대립보다 지속 가능한 공존 방향을 연구하고 있습니다.",

en:"ON does not view conflicts and distortions within reality simply through the framework of good and evil, winners and losers.<br><br>Most collisions and confusion are understood as arising from structural imbalance, disconnection, and insufficient mutual understanding, making the restoration of more harmonious connection structures and resonance possibilities an important direction.<br><br>ON-FORUM explores possibilities for structural adjustment and balance regarding various conflicts among individuals, societies, nations, and civilizations, researching sustainable coexistence rather than extreme confrontation."
},

world_5_title:{
ko:"9-5. 공존과 공진 중심 질서",
en:"9-5. An Order Centered on Coexistence and Resonance"
},

world_5_desc:{
ko:"온이 지향하는 방향은 지배와 경쟁 중심의 질서가 아니라, 공존과 공진 중심의 구조에 더 가깝습니다.<br><br>이는 단순히 이상적인 구호를 의미하는 것이 아니라, 인간과 사회, 기술과 자연, 국가와 문명이 서로 단절되지 않고 함께 지속될 수 있는 구조를 탐구하는 접근입니다.<br><br>온포럼은 현실 세계 속에서 보다 조화롭고 균형 있는 흐름이 가능하도록, 구조와 관계, 감응과 연결의 새로운 방향성을 연구하고 실질적으로 적용해 나가고자 합니다.",

en:"The direction pursued by ON is closer to a structure centered on coexistence and resonance rather than domination and competition.<br><br>This is not merely an idealistic slogan, but an approach that explores structures through which humanity and society, technology and nature, nations and civilizations may continue together without disconnection.<br><br>ON-FORUM seeks to research and practically apply new directions of structure, relationships, resonance, and connection so that more harmonious and balanced flows may become possible within the real world."
},

global_title:{
ko:"10. 국제 구조와 온포럼의 미래 방향",
en:"10. International Structures and the Future Direction of ON-FORUM"
},

global_1_title:{
ko:"10-1. 기존 국제 질서의 한계 인식",
en:"10-1. Recognizing the Limits of the Existing International Order"
},

global_1_desc:{
ko:"현재의 국제 질서는 인류의 협력과 안정에 일정한 역할을 해왔지만, 동시에 여러 구조적 한계 또한 함께 드러내고 있습니다.<br><br>국가 간 관계가 힘과 영향력 중심으로 작동하는 경우가 많으며, 강대국 중심의 논리와 이해관계가 국제 구조 전반에 큰 영향을 미치는 현실 역시 존재합니다.<br><br>온포럼은 이러한 흐름 속에서 발생하는 구조적 불균형과 왜곡, 그리고 갈등의 반복 가능성을 중요하게 바라보며, 보다 장기적이고 조화로운 방향에 대해 함께 고민하고 있습니다.",

en:"The current international order has played a certain role in human cooperation and stability, yet at the same time it has also revealed various structural limitations.<br><br>Relations between nations often operate around power and influence, while the logic and interests of major powers continue to exert significant influence across the international structure.<br><br>ON-FORUM pays close attention to the structural imbalances, distortions, and recurring possibilities of conflict emerging within these flows, while considering more harmonious and long-term directions."
},

global_2_title:{
ko:"10-2. 온포럼이 지향하는 국제 구조",
en:"10-2. The International Structure Pursued by ON-FORUM"
},

global_2_desc:{
ko:"ON-FORUM 은 경쟁과 대립 중심의 국제 질서보다, 조정과 공진 중심의 구조 가능성을 중요하게 생각합니다.<br><br>국가와 문명, 문화와 기술은 서로 완전히 분리된 존재가 아니라 연결된 흐름 속에 있다고 바라보며, 힘의 우위만이 아닌 균형과 상호작용, 지속 가능한 공존 구조를 탐구하고 있습니다.<br><br>또한 인간 중심의 제한된 관점을 넘어, 자연과 환경, 기술과 미래 세대까지 함께 고려하는 보다 전체적인 접근 방향을 지향하고 있습니다.",

en:"ON-FORUM values the possibility of international structures centered on coordination and resonance rather than competition and confrontation.<br><br>Nations and civilizations, cultures and technologies are viewed not as completely separate entities, but as interconnected flows, leading to the exploration of balance, interaction, and sustainable coexistence beyond simple power dominance.<br><br>It also seeks a broader approach that moves beyond limited human-centered perspectives to include nature, the environment, technology, and future generations together."
},

global_3_title:{
ko:"10-3. 현실 세계 문제에 대한 방향성",
en:"10-3. Directions for Addressing Real-World Problems"
},

global_3_desc:{
ko:"온포럼은 현실 세계의 다양한 문제들을 단순한 정치적 사건이나 일시적 충돌로만 바라보지 않습니다.<br><br>한국의 통일 문제, 일본의 자연재난과 구조 문제, 강대국 간 갈등과 긴장, 문명 충돌과 사회적 분열 등 역시 보다 깊은 구조와 흐름 속에서 이해해야 할 과제로 바라보고 있습니다.<br><br>온포럼은 이러한 문제들에 대해 단순한 이념 대립이나 힘의 논리를 넘어, 구조적 조정과 공존 가능성, 그리고 장기적인 문명 안정 방향을 함께 연구하고 있습니다.",

en:"ON-FORUM does not view the many issues of the real world merely as political events or temporary conflicts.<br><br>Challenges such as the question of Korean reunification, Japan’s natural disaster and structural issues, tensions among major powers, civilizational conflicts, and social divisions are also regarded as matters that must be understood within deeper structures and flows.<br><br>Beyond ideological confrontation or power-based logic, ON-FORUM researches possibilities for structural coordination, coexistence, and long-term civilizational stability."
},

global_4_title:{
ko:"10-4. 온경제·온정치·온질서 구조",
en:"10-4. Structures of ON Economy, ON Governance, and ON Order"
},

global_4_desc:{
ko:"온포럼은 기존의 정치·경제·사회 구조를 단순히 유지하거나 반복하는 데 머무르지 않고, 보다 조화롭고 순환 가능한 방향에 대한 연구를 이어가고 있습니다.<br><br>온화(ON Currency), 온치(ON Governance)와 같은 구조 역시 이러한 흐름 속에서 연구되고 있으며, 인간과 사회, 기술과 환경이 서로 단절되지 않고 연결될 수 있는 방향을 탐구하고 있습니다.<br><br>감응 기반 사회 구조, 순환 중심 경제 구조, 공진 기반 국제 질서와 같은 개념 또한 현실 세계 속에서 보다 지속 가능한 문명 구조 가능성을 모색하기 위한 연구의 일부입니다.",

en:"ON-FORUM does not remain focused on merely preserving or repeating existing political, economic, and social systems, but continues researching more harmonious and sustainable directions.<br><br>Structures such as ON Currency and ON Governance are also being explored within this flow, seeking directions in which humanity and society, technology and environment may remain interconnected rather than divided.<br><br>Concepts such as resonance-based social structures, circulation-centered economic systems, and resonance-based international orders are likewise part of research exploring more sustainable possibilities for civilization within the real world."
},

global_5_title:{
ko:"10-5. 세계 구조 비전",
en:"10-5. A Vision for Global Structures"
},

global_5_desc:{
ko:"온포럼은 단기간의 확장이나 외형적 성장보다, 장기적으로 현실 세계 속에서 실제로 연결되고 작동할 수 있는 글로벌 구조 가능성을 바라보고 있습니다.<br><br>향후 온의 구조와 연구가 세계적으로 확장될 경우, 서울을 중심 본부로 하는 글로벌 네트워크 구조와 국가별 연구·협력 지사 체계 역시 장기적 방향성 가운데 하나로 구상되고 있습니다.<br><br>또한 단순한 이론 연구에 머무르지 않고, 다양한 국가와 사회 속에서 현실 적용과 구조적 연결이 가능한 시스템 구축 방향까지 함께 탐구해 나가고 있습니다.",

en:"ON-FORUM looks beyond short-term expansion or outward growth toward the possibility of global structures that can genuinely connect and function within the real world over the long term.<br><br>If the structures and research of ON expand globally in the future, one long-term direction being envisioned includes a global network centered around a headquarters in Seoul along with national research and cooperation branches.<br><br>Furthermore, ON-FORUM seeks not only theoretical research, but also the development of systems capable of real-world application and structural connection across various nations and societies."
},

future_title:{
ko:"11. 앞으로의 방향",
en:"11. Future Directions"
},

future_1_title:{
ko:"11-1. 문서화와 체계화",
en:"11-1. Documentation and Systemization"
},

future_1_desc:{
ko:"온포럼은 지금까지 축적되어 온 연구와 기록들을 보다 정합적이고 지속 가능한 형태로 정리해 나가고 있습니다.<br><br>방대한 메모와 구조 자료, 개념 체계와 연구 흐름들을 문서화하고 체계화함으로써, 단순한 개인의 사유를 넘어 공유 가능한 연구 구조로 발전시키는 작업이 계속 이루어지고 있습니다.<br><br>이는 온의 방향성과 구조를 장기적으로 보존하고 확장하기 위한 중요한 기반 과정이기도 합니다.",

en:"ON-FORUM is organizing the research and records accumulated so far into more coherent and sustainable forms.<br><br>By documenting and systemizing extensive notes, structural materials, conceptual systems, and research flows, ongoing efforts are transforming them beyond individual contemplation into research structures that can be shared collectively.<br><br>This process also serves as an important foundation for preserving and expanding the direction and structure of ON over the long term."
},

future_2_title:{
ko:"11-2. 교육 및 연구 공개",
en:"11-2. Education and Public Research Sharing"
},

future_2_desc:{
ko:"온포럼은 연구와 구조를 특정 집단 안에 제한하기보다, 점진적으로 공개하고 함께 탐구할 수 있는 방향을 중요하게 생각합니다.<br><br>앞으로 다양한 문서와 연구 자료, 교육 구조와 설명 체계들을 정리하여 보다 많은 사람들이 온의 구조와 방향성을 이해할 수 있도록 연구 공개와 교육 기반 확장을 추진해 나갈 예정입니다.<br><br>또한 단순한 지식 전달을 넘어, 구조적으로 사고하고 연결할 수 있는 새로운 접근 가능성 역시 함께 탐구하고 있습니다.",

en:"ON-FORUM values gradually opening and collectively exploring its research and structures rather than limiting them to a particular group.<br><br>In the future, various documents, research materials, educational structures, and explanatory systems will be organized so that more people may understand the structures and directions of ON, while research sharing and educational foundations continue to expand.<br><br>Beyond simple knowledge transmission, ON-FORUM also explores new possibilities for structural thinking and interconnected understanding."
},

future_3_title:{
ko:"11-3. 영상·언어·기술 확장",
en:"11-3. Expansion Through Media, Language, and Technology"
},

future_3_desc:{
ko:"온의 연구는 문서에만 머무르지 않고, 영상·언어·기술 등 다양한 형태로 확장될 가능성을 가지고 있습니다.<br><br>온어(ON Language)를 비롯한 구조 언어 연구, 영상과 시각 기반 전달 구조, 차세대 기술 및 정보 구조와 연결 가능한 다양한 실험과 설계 또한 장기적인 방향 속에서 함께 연구되고 있습니다.<br><br>이를 통해 보다 직관적이고 실제적인 방식으로 온의 구조와 흐름을 전달하고 연결할 수 있는 가능성을 모색하고 있습니다.",

en:"The research of ON is not limited to documents alone, but holds the potential to expand into various forms including media, language, and technology.<br><br>Research into structural languages such as ON Language, visual and video-based communication structures, and diverse experiments and designs connected to next-generation technologies and information systems are also being pursued within long-term directions.<br><br>Through these efforts, ON-FORUM seeks possibilities for conveying and connecting the structures and flows of ON in more intuitive and practical ways."
},

future_4_title:{
ko:"11-4. 실질 적용 모델 구축",
en:"11-4. Building Practical Application Models"
},

future_4_desc:{
ko:"온포럼은 단순한 이론 구축에 머무르지 않고, 현실 세계 속에서 실제로 작동 가능한 구조를 함께 중요하게 바라보고 있습니다.<br><br>사회와 교육, 기술과 환경, 인간 관계와 문명 구조 속에서 온의 방향성이 어떻게 적용될 수 있는지에 대한 다양한 실질적 모델과 가능성들을 점진적으로 연구하고 구축해 나갈 예정입니다.<br><br>이는 보여주기식 변화보다, 현실 속에서 지속 가능하게 작동하는 구조를 만드는 방향에 더 가깝습니다.",

en:"ON-FORUM does not remain focused solely on building theories, but also places importance on structures that can genuinely function within the real world.<br><br>Various practical models and possibilities regarding how the directions of ON may be applied within society and education, technology and environment, human relationships and civilizational structures will gradually be researched and developed.<br><br>This approach is closer to creating structures that operate sustainably within reality rather than pursuing superficial demonstrations of change."
},

future_5_title:{
ko:"11-5. 장기적 문명 구조 연구",
en:"11-5. Long-Term Research on Civilizational Structures"
},

future_5_desc:{
ko:"온포럼은 단기적인 현상 분석이나 일시적 흐름에만 머무르지 않고, 인류 문명과 존재 구조 전체를 장기적인 관점에서 바라보고 있습니다.<br><br>기술 발전과 인간 사회의 변화, 국제 질서와 문명 구조, 미래 세대와 우주 환경까지 포함하여, 앞으로 인류와 세계가 어떤 방향으로 나아갈 수 있는가에 대한 장기적 연구가 이어지고 있습니다.<br><br>온포럼은 이러한 흐름 속에서, 보다 조화롭고 지속 가능한 문명 구조 가능성을 탐구하며 미래를 향한 구조적 방향성을 계속 연구해 나가고 있습니다.",

en:"ON-FORUM does not remain limited to short-term analysis or temporary trends, but views human civilization and structures of existence from a long-term perspective.<br><br>Long-term research continues regarding the directions humanity and the world may move toward, including technological advancement, changes in human society, international orders, civilizational structures, future generations, and the cosmic environment.<br><br>Within these flows, ON-FORUM continues researching structural directions toward the future while exploring possibilities for more harmonious and sustainable civilizational structures."
},

connect_title:{

},

connect_1_title:{

connect_1_desc:{
ko:"ON-FORUM 은 특정 분야나 일부 전문가만의 공간이 아니라, 현실과 존재, 인간과 문명에 대해 함께 고민하고 탐구하려는 사람들과의 연결 가능성을 중요하게 생각합니다.<br><br>온포럼의 연구는 아직 진행 중인 구조이며, 다양한 관점과 경험, 분야 간의 연결 속에서 더욱 확장되고 발전해 나갈 수 있다고 바라보고 있습니다.",

en:"ON-FORUM is not a space reserved only for specific fields or a small group of experts, but values the possibility of connection with people who seek to reflect upon and explore reality and existence, humanity and civilization together.<br><br>The research of ON-FORUM remains an evolving structure, and it is viewed as something that can continue to expand and develop through diverse perspectives, experiences, and interdisciplinary connections."
},

connect_2_title:{

},

connect_2_desc:{
ko:"온포럼은 연구와 구조, 기술과 교육, 언어와 문화 등 다양한 영역에서의 협력 가능성을 열어두고 있습니다.<br><br>현실 문제에 대한 구조적 접근, 새로운 기술과 표현 방식, 교육과 기록 체계 등 여러 분야에서의 제안과 협력은 앞으로의 방향을 함께 확장시키는 중요한 연결이 될 수 있습니다.<br><br>온포럼은 단순한 경쟁보다, 서로의 가능성을 연결하고 조화롭게 발전시키는 방향을 중요하게 생각합니다.",

en:"ON-FORUM remains open to possibilities for collaboration across various areas including research and structures, technology and education, language and culture.<br><br>Proposals and collaborations involving structural approaches to real-world problems, new technologies and forms of expression, educational and archival systems, and many other fields may become important connections that expand future directions together.<br><br>ON-FORUM values connecting and harmoniously developing each other's possibilities more than simple competition."
},

connect_3_title:{
ko:"12-3. 후원과 지원",
en:"12-3. Sponsorship and Support"
},

connect_3_desc:{
ko:"온포럼은 현재 작은 기반 위에서 현실적인 구축 과정을 이어가고 있으며, 장기적인 연구와 기록 보존, 구조 구축을 위해 다양한 형태의 후원과 지원 가능성을 함께 열어두고 있습니다.<br><br>이는 단순한 운영 자금의 의미를 넘어, 인간과 문명, 미래 구조에 대한 연구와 기록을 지속적으로 이어가기 위한 현실적 기반과 연결되어 있습니다.<br><br>온포럼은 방향성과 진정성을 바탕으로, 장기적으로 지속 가능한 구조를 만들어가고자 합니다.",

en:"ON-FORUM is currently continuing its realistic process of development upon a modest foundation, while remaining open to various forms of sponsorship and support for long-term research, archival preservation, and structural development.<br><br>This goes beyond the meaning of simple operational funding and is connected to creating realistic foundations for continuously sustaining research and records concerning humanity, civilization, and future structures.<br><br>Based on direction and sincerity, ON-FORUM seeks to build structures that can remain sustainable over the long term."
},

connect_4_title:{
ko:"12-4. 기록 보존",
en:"12-4. Preservation of Records"
},

connect_4_desc:{
ko:"온포럼은 지금까지 축적되어 온 연구와 기록들이 단순한 개인 자료로 사라지지 않고, 장기적으로 보존되고 정리될 필요성을 중요하게 바라보고 있습니다.<br><br>문서와 노트, 구조 자료와 언어 체계, 연구 흐름과 사유 기록들은 앞으로의 연구와 미래 세대에게도 의미 있는 자료가 될 가능성을 가지고 있으며, 이를 위한 체계적인 정리와 보존 작업 또한 함께 이어지고 있습니다.",

en:"ON-FORUM considers it important that the research and records accumulated so far do not disappear as merely personal materials, but are preserved and organized over the long term.<br><br>Documents and notes, structural materials and language systems, research flows and records of contemplation all hold the potential to become meaningful resources for future research and generations, and systematic efforts for their preservation and organization are continuing together."
},

connect_5_title:{
ko:"12-5. 공진의 연결",
en:"12-5. The Connection of Resonance"
},

connect_5_desc:{
ko:"온이 지향하는 방향은 단순한 정보 전달이나 일방적 주장에 머무르지 않습니다.<br><br>온포럼은 인간과 인간, 사회와 문명, 기술과 미래가 서로 단절되지 않고 연결될 수 있는 가능성을 중요하게 바라보며, 그러한 흐름 속에서 함께 공진할 수 있는 관계와 구조를 탐구하고 있습니다.<br><br>작은 연결 하나가 새로운 흐름의 시작이 될 수 있듯이, 온포럼 또한 현실 속에서 사람과 세계를 잇는 하나의 공진 구조로 성장해 나가고자 합니다.",

en:"The direction pursued by ON does not remain limited to simple information delivery or one-sided assertions.<br><br>ON-FORUM values the possibility that people and people, society and civilization, technology and the future may remain connected rather than divided, while exploring relationships and structures capable of resonating together within such flows.<br><br>Just as a single small connection may become the beginning of a new flow, ON-FORUM also seeks to grow as a resonant structure that connects people and the world within reality."
},

function setLang(lang){
localStorage.setItem("lang",lang);

document.querySelectorAll("[data-i18n]").forEach(el=>{
const key = el.dataset.i18n;
el.innerHTML = content[key][lang];
});

document.getElementById("btn-ko").classList.toggle("active",lang==="ko");
document.getElementById("btn-en").classList.toggle("active",lang==="en");
}

window.onload=function(){
setLang(localStorage.getItem("lang")||"ko");
}

</script>
