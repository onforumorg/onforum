<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ON-FORUM | Introduction</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

<style>
:root {
    --primary-color: #2c3e50;
    --bg-color: #f8f9fa;
    --text-color: #333;
    --accent-color: #3498db;
}
body {
    font-family: 'Pretendard', sans-serif;
    background: var(--bg-color);
    margin: 0;
}
.container {
    max-width: 800px;
    margin: auto;
    padding: 40px 20px;
}
.lang-switch {
    position: fixed;
    top: 20px;
    right: 30px;
}
.lang-btn {
    border: none;
    background: none;
    cursor: pointer;
    font-weight: bold;
}
.lang-btn.active {
    border-bottom: 2px solid #000;
}
header {
    text-align: center;
    margin-bottom: 40px;
}
.intro-box {
    background: white;
    padding: 30px;
    border-radius: 10px;
}
h2 {
    margin-top: 30px;
    color: var(--accent-color);
}
ul {
    background: #eee;
    padding: 20px;
}
.process {
    margin-top: 20px;
    background: #ddd;
    padding: 10px;
    text-align: center;
}
.back {
    text-align: center;
    margin-top: 20px;
}
</style>
</head>

<body>

<nav class="lang-switch">
    <button id="btn-ko" class="lang-btn" onclick="setLang('ko')">KOR</button>
    <button id="btn-en" class="lang-btn" onclick="setLang('en')">ENG</button>
</nav>

<div class="container">

<header>
    <h1 data-i18n="title"></h1>
    <p data-i18n="subtitle"></p>
</header>

<div class="intro-box">

<h2 data-i18n="sec1_title"></h2>
<p data-i18n="sec1_desc"></p>

<h2 data-i18n="sec2_title"></h2>
<p data-i18n="sec2_desc"></p>

<h2 data-i18n="sec3_title"></h2>
<p data-i18n="sec3_desc"></p>

<h2 data-i18n="sec4_title"></h2>
<ul>
<li data-i18n="domain1"></li>
<li data-i18n="domain2"></li>
<li data-i18n="domain3"></li>
<li data-i18n="domain4"></li>
<li data-i18n="domain5"></li>
<li data-i18n="domain6"></li>
</ul>

<h2 data-i18n="sec5_title"></h2>
<div class="process" data-i18n="process"></div>

</div>

<div class="back">
    <a href="index.html" data-i18n="back"></a>
</div>

</div>

<script>
const content = {

title: {
    ko: "온포럼 (On-Forum)",
    en: "On-Forum"
},
subtitle: {
    ko: "현실을 바라보는 기준을 다시 정의하다",
    en: "Redefining the standards for perceiving reality"
},

sec1_title: { ko: "1. 우리는 무엇을 하는가", en: "1. What We Do" },
sec1_desc: {
    ko: "온포럼은 현실을 바라보는 기준 자체를 다시 정의하는 연구·실천 공동체입니다.",
    en: "On-Forum redefines the standards of perceiving reality."
},

sec2_title: { ko: "2. 왜 온포럼이 필요한가", en: "2. Why On-Forum?" },
sec2_desc: {
    ko: "정보는 넘치지만 구조는 부재한 시대입니다.",
    en: "We live in an era of information overload but structural absence."
},

sec3_title: { ko: "3. 온의 관점", en: "3. The Perspective of On" },
sec3_desc: {
    ko: "온은 있는 그대로를 보고 구조를 드러냅니다.",
    en: "On reveals structures as they are."
},

sec4_title: { ko: "4. 우리가 다루는 영역", en: "4. Domains" },

domain1: { ko: "철학 - 존재와 인식", en: "Philosophy - Being" },
domain2: { ko: "과학 - 자연의 원리", en: "Science - Nature" },
domain3: { ko: "수·정보 구조", en: "Math / Info" },
domain4: { ko: "정치 - 권력 구조", en: "Politics - Power" },
domain5: { ko: "경제 - 가치 흐름", en: "Economy - Value" },
domain6: { ko: "기술 - 구현 구조", en: "Technology - Implementation" },

sec5_title: { ko: "5. 온포럼의 방향", en: "5. Direction" },
process: {
    ko: "연구 → 구조 → 실천 → 확산",
    en: "Research → Structure → Practice → Expansion"
},

back: {
    ko: "← 메인으로 돌아가기",
    en: "← Back to Home"
}

};

function setLang(lang) {
    localStorage.setItem("lang", lang);

    document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.dataset.i18n;
        el.innerText = content[key][lang];
    });

    document.getElementById("btn-ko").classList.toggle("active", lang === "ko");
    document.getElementById("btn-en").classList.toggle("active", lang === "en");
}

window.onload = function() {
    const lang = localStorage.getItem("lang") || "ko";
    setLang(lang);
};
</script>

</body>
</html>
