<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일시후원 | ON-FORUM</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>

<style>

:root{
--bg-main:#f7f6f2;
--deep-blue:#1a2a40;
--gold:#b5945d;
--text:#1a1a1a;
--sub:#666;
}

body{
margin:0;
font-family:'Pretendard',sans-serif;
background:
radial-gradient(circle at 20% 30%, rgba(181,148,93,0.08), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(26,42,64,0.05), transparent 40%),
var(--bg-main);
color:var(--text);
}

.container{
max-width:900px;
margin:auto;
padding:60px 20px;
}

.card{
background:#fff;
padding:50px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,.05);
}

h1{
text-align:center;
color:var(--deep-blue);
margin-bottom:25px;
}

p{
line-height:2;
color:var(--sub);
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>일시후원</h1>

<p style="text-align:center;font-size:1.1rem;">
계좌이체로 자유롭게 후원하실 수 있습니다.
</p>

</div>

</div>

</body>
</html>
