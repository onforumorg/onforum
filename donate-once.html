<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일시후원 | ON-FORUM</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>

<style>

:root{
--bg-main:#f7f6f2;
--deep-blue:#1a2a40;
--gold:#b5945d;
--text:#1a1a1a;
--sub:#666;
}

body{
margin:0;
font-family:'Pretendard',sans-serif;
background:
radial-gradient(circle at 20% 30%, rgba(181,148,93,0.08), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(26,42,64,0.05), transparent 40%),
var(--bg-main);
color:var(--text);
}

.container{
max-width:900px;
margin:auto;
padding:60px 20px;
}

.card{
background:#fff;
padding:50px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,.05);
}

h1{
text-align:center;
color:var(--deep-blue);
margin-bottom:25px;
}

p{
line-height:2;
color:var(--sub);
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>일시후원</h1>

<p style="text-align:center;font-size:1.1rem;">
계좌이체로 자유롭게 후원하실 수 있습니다.
</p>

<div style="margin-top:50px; border-top:1px solid rgba(0,0,0,0.08); padding-top:40px;">

<h2 style="color:var(--deep-blue); margin-bottom:25px;">후원 계좌</h2>

<p><strong>은행</strong><br>
농협</p>

<p>
<strong>계좌번호</strong><br>
<span id="account-number">301-0799-7878-21</span>
</p>

<p><strong>예금주</strong><br>
온포럼</p>

<p style="margin-top:35px; font-size:0.95rem; color:var(--sub);">
입금자명이 후원자명과 다른 경우에는<br>
확인을 위해 별도로 알려주시기 바랍니다.
</p>
  
<a href="#"
onclick="copyAccount(); return false;"
style="display:inline-block; margin-top:20px; padding:12px 22px; background:var(--deep-blue); color:#fff; text-decoration:none; border-radius:6px;">
  계좌번호 복사
</a>

<div style="margin-top:45px; text-align:center;">

  <h3 style="color:var(--deep-blue); margin-bottom:20px;">
    QR코드 후원
  </h3>

<img src="images/donation-qr.png"
     alt="공진후원 QR코드"
     style="width:180px; height:180px; border-radius:12px; border:1px solid #ddd;">

  <p style="margin-top:15px; font-size:0.95rem;">
    모바일에서 QR코드를 스캔하여<br>
    바로 후원하실 수 있습니다.
  </p>

</div>
  
</div>

</div>

<script>

function copyAccount(){

 const account = document.getElementById("account-number").innerText;

  navigator.clipboard.writeText(account);

  alert("계좌번호가 복사되었습니다.");

}

</script>
  
</body>
</html>
