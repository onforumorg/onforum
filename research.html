<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ON-FORUM | Research</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

<style>
:root {
    --primary-color: #2c3e50;
    --bg-color: #ffffff;
    --text-color: #2d3436;
    --accent-color: #3498db;
}
body {
    font-family: 'Pretendard', sans-serif;
    margin: 0;
    background: var(--bg-color);
}
.container {
    max-width: 900px;
    margin: auto;
    padding: 60px 20px;
}
.lang-switch {
    position: fixed;
    top: 20px;
    right: 30px;
}
.lang-btn {
    border: none;
    background: none;
    cursor: pointer;
    font-weight: bold;
}
.lang-btn.active {
    border-bottom: 2px solid #000;
}
header {
    text-align: center;
    margin-bottom: 60px;
}
.section {
    margin-bottom: 60px;
}
.card {
    margin-bottom: 40px;
}
.back {
    text-align: center;
    margin-top: 50px;
}
</style>
</head>

<body>

<nav class="lang-switch">
    <button id="btn-ko" class="lang-btn" onclick="setLang('ko')">KOR</button>
    <button id="btn-en" class="lang-btn" onclick="setLang('en')">ENG</button>
</nav>

<div class="container">

<header>
    <h1 data-i18n="title"></h1>
    <p data-i18n="subtitle"></p>
</header>

<section class="section">
    <div data-i18n="intro"></div>
</section>

<section id="research-list"></section>

<section id="sample"></section>

<section id="notice"></section>

<div class="back">
    <a href="index.html" data-i18n="back"></a>
</div>

</div>

<script>

const content = {
title: { ko: "연구보기", en: "Research" },
subtitle: {
    ko: "현실을 해석하는 구조의 일부",
    en: "A cross-section of structural interpretation"
},
intro: {
    ko: "우리는 지식을 나열하지 않습니다.<br><strong>구조를 연구합니다.</strong>",
    en: "We do not list knowledge.<br><strong>We study structure.</strong>"
},
back: {
    ko: "← 홈으로 돌아가기",
    en: "← Back to Home"
}
};

const researchData = [
{
    title: {
        ko: "① 판단의 혼란을 구조로 해소하다",
        en: "① Resolving Confusion through Structure"
    },
    desc: {
        ko: "정보 문제가 아닌 구조 부재 문제",
        en: "Not an information issue, but structural absence"
    }
},
{
    title: {
        ko: "② 감정과 사실의 충돌",
        en: "② Clash of Emotion and Fact"
    },
    desc: {
        ko: "감정 흐름과 판단 구조 불일치",
        en: "Mismatch between emotion and structure"
    }
}
];

const sampleData = {
title: {
    ko: "구조 적용 샘플",
    en: "Structural Sample"
},
content: {
    ko: "정보 과잉 → 판단 마비",
    en: "Info overload → paralysis"
}
};

const noticeData = {
title: {
    ko: "일부 연구는 공개되지 않습니다",
    en: "Some research is restricted"
},
desc: {
    ko: "참여를 통해 접근 가능합니다",
    en: "Accessible through participation"
}
};

function renderResearch(lang) {
    const container = document.getElementById("research-list");
    container.innerHTML = "";

    researchData.forEach(r => {
        const el = document.createElement("div");
        el.className = "card";

        el.innerHTML = `
            <h3>${r.title[lang]}</h3>
            <p>${r.desc[lang]}</p>
        `;
        container.appendChild(el);
    });

    const sample = document.getElementById("sample");
    sample.innerHTML = `
        <h2>${sampleData.title[lang]}</h2>
        <p>${sampleData.content[lang]}</p>
    `;

    const notice = document.getElementById("notice");
    notice.innerHTML = `
        <h2>${noticeData.title[lang]}</h2>
        <p>${noticeData.desc[lang]}</p>
    `;
}

function setLang(lang) {
    localStorage.setItem("lang", lang);

    document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.dataset.i18n;
        el.innerHTML = content[key][lang];
    });

    renderResearch(lang);

    document.getElementById("btn-ko").classList.toggle("active", lang === "ko");
    document.getElementById("btn-en").classList.toggle("active", lang === "en");
}

window.onload = function() {
    const lang = localStorage.getItem("lang") || "ko";
    setLang(lang);
};

</script>

</body>
</html>
