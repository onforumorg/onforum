<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ON-FORUM</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>

<style>
body{
  font-family:'Pretendard',sans-serif;
  margin:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(181,148,93,0.08), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(26,42,64,0.06), transparent 40%),
    linear-gradient(to bottom,#f7f6f2,#f2efe8);
}

.container{max-width:1000px;margin:auto;padding:40px 20px;}
.center{text-align:center;}

/* 언어 버튼 */
.lang-switch{position:fixed;top:20px;right:30px;}
.lang-btn{border:none;background:none;font-weight:bold;cursor:pointer;}
.lang-btn.active{border-bottom:2px solid #000;}

/* HERO */
.hero{text-align:center;padding:100px 20px 60px;}

.title{
  font-size:4rem;font-weight:900;letter-spacing:10px;
  background:linear-gradient(90deg,#1a2a40,#888,#1a2a40);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:40px;
}

.main-text{
  font-size:1.3rem;
  color:#333;
}

.sub-text{
  font-size:1.15rem;
  font-weight:600;
  margin-bottom:40px;
}

/* 버튼 */
.menu{margin-top:30px;margin-bottom:60px;}
.menu a{
  display:inline-block;
  margin:0 8px;
  padding:10px 22px;
  border-radius:8px;
  border:1px solid rgba(26,42,64,0.2);
  background:rgba(255,255,255,0.6);
  color:#1a2a40;
  font-weight:600;
  text-decoration:none;
  transition:0.3s;
}
.menu a:hover{
  background:#1a2a40;
  color:#fff;
}

/* 질문 */
.question{margin-top:40px;}
.question h2{
  font-size:1.6rem;
  margin-bottom:10px;
}
.question p{
  color:#555;
  margin:5px 0;
}
.question strong{
  font-size:1.1rem;
}

/* 🔶 핵심: 하단 띠 */
.bottom-band{
  margin-top:70px;
  padding:30px 20px;
  background-color:#4b5320;
  color:#ffffff;
  text-align:center;
  font-size:1.05rem;
  letter-spacing:0.5px;
}

/* SECTION */
.section{max-width:900px;margin:120px auto;position:relative;}
.section::before{
  content:"";position:absolute;top:-70px;left:50%;
  width:60px;height:1px;background:rgba(0,0,0,0.1);
  transform:translateX(-50%);
}

/* FOOTER */
.footer{
  margin-top:120px;
  padding:60px 20px 40px;
  background:linear-gradient(to top,#f0ede6,transparent);
}
.footer-inner{
  max-width:900px;margin:auto;
  display:flex;justify-content:space-between;flex-wrap:wrap;
}
.footer-brand,.footer-contact,.footer-copy{flex:1;min-width:200px;}
.footer-brand{text-align:left;}
.footer-contact{text-align:center;}
.footer-copy{text-align:right;}

@media(max-width:768px){
  .footer-inner{flex-direction:column;text-align:center;}
  .footer-brand,.footer-contact,.footer-copy{text-align:center;}
}
</style>
</head>

<body>

<!-- 언어 -->
<nav class="lang-switch">
<button id="btn-ko" class="lang-btn" onclick="setLang('ko')">KOR</button>
<button id="btn-en" class="lang-btn" onclick="setLang('en')">ENG</button>
</nav>

<div class="container">

<!-- HERO -->
<section class="hero">

  <h1 class="title">ON-FORUM</h1>

  <p class="main-text">복잡한 현실을 구조로 해석하는 인식 시스템</p>
  <p class="sub-text">문제는 정보가 아니라 구조입니다</p>

  <div class="menu">
    <a href="#">소개</a>
    <a href="#">사례</a>
    <a href="#">연구</a>
    <a href="#">참여</a>
  </div>

  <div class="question">
    <h2>우리는 왜 같은 문제를 반복할까요?</h2>
    <p>정보는 충분합니다.</p>
    <p><strong>그러나 기준은 없습니다.</strong></p>
  </div>

  <!-- 🔶 핵심 띠 -->
  <div class="bottom-band">
    온포럼은 현실을 구조로 분석하는 연구 플랫폼입니다
  </div>

</section>

</div>

<!-- footer -->
<footer class="footer">
<div class="footer-inner">

<div class="footer-brand">
<strong>ON-FORUM</strong>
<p>현실을 구조로 분석하는 연구 플랫폼</p>
</div>

<div class="footer-contact">
<p>📞 0505-799-7878</p>
<p>✉️ onforum.org@gmail.com</p>
<p>🌐 https://on-forum.org/</p>
</div>

<div class="footer-copy">
© 2026 ON-FORUM. All rights reserved.
</div>

</div>
</footer>

<script>
function setLang(lang){
localStorage.setItem("lang",lang);
document.getElementById("btn-ko").classList.toggle("active",lang==="ko");
document.getElementById("btn-en").classList.toggle("active",lang==="en");
}
window.onload=function(){
setLang(localStorage.getItem("lang")||"ko");
}
</script>

</body>
</html>
