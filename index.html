<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title id="page-title">ON-FORUM</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>

<style>
body{
  font-family:'Pretendard',sans-serif;
  margin:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(181,148,93,0.08), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(26,42,64,0.06), transparent 40%),
    linear-gradient(to bottom,#f7f6f2,#f2efe8);
}

.container{max-width:1100px; margin:0 auto; padding:40px 20px;}
.center{text-align:center;}

.lang-switch{position:fixed;top:20px;right:30px;z-index:100;}
.lang-btn{border:none;background:none;font-weight:bold;cursor:pointer;}
.lang-btn.active{border-bottom:2px solid #000;}

.hero{padding:100px 20px 60px;}

.hero-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:40px;
  max-width:1100px;
  margin:0 auto;
}

.hero-left{flex:1; text-align:left;}
.hero-right{flex:1; display:flex; justify-content:center;}

.concept-box{
  background:rgba(255,255,255,0.6);
  padding:30px;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
  font-weight:700;
  line-height:2;
  text-align:center;
}

.hero-title{
  font-size:4.2rem;
  font-weight:900;
  letter-spacing:14px;
  background:linear-gradient(90deg,#1a2a40,#aaa,#1a2a40);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:30px;
}

.main-text{ font-size:1.5rem; font-weight:600; color:#222; }
.sub-text{ font-size:1.2rem; font-weight:700; margin-bottom:50px; }

.menu{margin-top:30px;margin-bottom:40px;}
.menu a{
  display:inline-block;
  margin:0 10px 10px 0;
  padding:12px 26px;
  border-radius:10px;
  border:1px solid rgba(26,42,64,0.2);
  background:rgba(255,255,255,0.7);
  color:#1a2a40;
  font-weight:700;
  text-decoration:none;
  transition:0.25s;
}
.menu a:hover{ background:#1a2a40; color:#fff; }

.question h2{ font-size:1.9rem; margin-bottom:15px; }
.question p{ font-size:1.15rem; margin:6px 0; }
.question strong{ font-size:1.25rem; }

.bottom-band{
  margin-top:40px;
  padding:40px 20px;
  background-color:#4b5320;
  color:#fff;
  text-align:center;
  font-size:1.3rem;
  font-weight:700;
  letter-spacing:0.6px;
}

/* [1] 공통 및 PC용 설정 (어디서나 기본으로 적용됨) */
.footer {
  margin-top: 120px;
  padding: 60px 20px 40px;
  background: linear-gradient(to top, #f0ede6, transparent);
}
.footer-inner {
  max-width: 1000px; margin: auto;
  display: flex; justify-content: space-between; flex-wrap: wrap;
}
.footer-brand, .footer-contact, .footer-copy { flex: 1; min-width: 200px; }
.footer-brand { text-align: left; }
.footer-contact { text-align: center; }
.footer-copy { text-align: right; }

.onforum-logo-container {
  display: flex;
  justify-content: center;
  margin-top: 60px;
  margin-bottom: -20px;
}

/* 온포럼 메인 타이틀 디자인 (기본) */
.hero-title {
  font-family: 'Pretendard', sans-serif;
  font-weight: 900;
  font-size: 4rem;
  letter-spacing: 5px;
  background: linear-gradient(to right, #444444, #bbbbbb, #444444);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  transition: all 0.5s ease;
  cursor: pointer;
  display: inline-block; /* 효과가 잘 먹도록 추가 */
}

/* 마우스를 올렸을 때 검정색으로 변화 (공통) */
.hero-title:hover {
  background: none !important;
  -webkit-text-fill-color: #000000 !important;
  transform: translateY(-3px);
}

/* [2] 모바일 환경 설정 (768px 이하에서만 적용) */
@media(max-width: 768px) {
  .footer-inner { flex-direction: column; text-align: center; }
  .hero-inner { flex-direction: column; }
  .hero-left { text-align: center; }
  .hero-title {
    font-size: 2.5rem; /* 모바일에서는 글씨 크기 축소 */
    letter-spacing: 3px;
  }
}

/* [3] 애니메이션 효과 */
@keyframes breathe {
  0% { opacity: 0.8; transform: scale(0.98); }
  50% { opacity: 1; transform: scale(1); }
  100% { opacity: 0.8; transform: scale(0.98); }
}

.onforum-logo-animated {
  animation: breathe 5s ease-in-out infinite;
  display: inline-block;
  transform-origin: center;
}
</style>
</head>

<body>

<nav class="lang-switch">
<button id="btn-ko" class="lang-btn" onclick="setLang('ko')">KOR</button>
<button id="btn-en" class="lang-btn" onclick="setLang('en')">ENG</button>
</nav>

<div class="onforum-logo-container">
  <div class="onforum-logo-animated">
    <svg width="200" height="200" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="movingGradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#d1d1d1; stop-opacity:1" />
          <stop offset="50%" style="stop-color:#000000; stop-opacity:1">
            <animate attributeName="offset" values="0.3; 0.7; 0.3" dur="6s" repeatCount="indefinite" />
          </stop>
          <stop offset="100%" style="stop-color:#d1d1d1; stop-opacity:1" />
        </linearGradient>
      </defs>

      <circle cx="100" cy="100" r="80" stroke="url(#movingGradient)" stroke-width="12" fill="none" />
      
      <circle cx="100" cy="100" r="20" fill="url(#movingGradient)" />
      
      <polygon points="100,135 40,210 170,210" stroke="url(#movingGradient)" stroke-width="10" fill="none" />
    </svg>
  </div>
</div>
<section class="hero">
  <div class="hero-inner">

    <div class="hero-left">
      <h1 class="hero-title">ON-FORUM</h1>

      <p class="main-text" data-i18n="hero"></p>
      <p class="sub-text" data-i18n="hero_sub"></p>

      <div class="menu">
        <a href="#intro" data-i18n="btn_intro"></a>
        <a href="#structure" data-i18n="btn_structure"></a>
       <a href="cases.html" data-i18n="btn_cases"></a>
        <a href="#research" data-i18n="btn_research"></a>
      </div>

      <div class="question">
        <h2 data-i18n="q_title"></h2>
        <p data-i18n="q_1"></p>
        <p data-i18n="q_2"></p>
      </div>
    </div>

    <div class="hero-right">
      <div class="concept-box">
        <p data-i18n="c_philosophy"></p>
        <p data-i18n="c_society"></p>
        <p data-i18n="c_economy"></p>
        <p data-i18n="c_education"></p>
      </div>
    </div>

  </div>
</section>

<div class="bottom-band" data-i18n="definition"></div>

<section id="intro" class="container center">
  <h2 data-i18n="intro_title"></h2>
  <p data-i18n="intro_desc"></p>
</section>

<!-- ✅ 추가된 구조 섹션 -->
<section id="structure" class="container center">
  <h2 data-i18n="structure_title"></h2>
  <p data-i18n="structure_desc"></p>
</section>

<section id="cases" class="container center">
  <h2 data-i18n="cases_title"></h2>
  <p data-i18n="cases_desc"></p>
</section>

<section id="research" class="container center">
  <h2 data-i18n="research_title"></h2>
  <p data-i18n="research_desc"></p>
</section>

<footer class="footer">
<div class="footer-inner">
  <div class="footer-brand">
    <strong>ON-FORUM</strong>
    <p data-i18n="definition"></p>
  </div>
  <div class="footer-contact">
    <p>📞 0505-799-7878</p>
    <p>✉️ onforum.org@gmail.com</p>
    <p>🌐 https://on-forum.org/</p>
  </div>
  <div class="footer-copy">
    © 2026 ON-FORUM. All rights reserved.
  </div>
</div>
</footer>

<script>
const content={
hero:{ko:"세상을 해석하는 기준을 다시 설계합니다",en:"Redefining the way we interpret reality"},
hero_sub:{ko:"문제는 정보가 아니라 구조입니다",en:"The problem is not information, but structure"},
definition:{ko:"온포럼은 현실을 구조로 분석하는 연구 플랫폼입니다",en:"A platform that analyzes reality through structure"},

btn_intro:{ko:"소개",en:"Intro"},
btn_structure:{ko:"구조 보기",en:"Structure"},
btn_cases:{ko:"사례 보기",en:"Cases"},
btn_research:{ko:"연구 참여",en:"Research"},

q_title:{ko:"우리는 왜 같은 문제를 반복할까요?",en:"Why do we keep repeating the same problems?"},
q_1:{ko:"정보는 충분합니다.",en:"We already have enough information."},
q_2:{ko:"<strong>그러나 기준은 없습니다.</strong>",en:"<strong>But we lack a standard.</strong>"},

intro_title:{ko:"온포럼 소개",en:"About ON-FORUM"},
intro_desc:{ko:"현실을 구조로 이해하는 새로운 접근",en:"A new approach to understanding reality through structure"},

structure_title:{ko:"구조 보기",en:"Structure"},
structure_desc:{ko:"현실을 구성하는 구조를 이해합니다",en:"Understanding the structure that shapes reality"},

cases_title:{ko:"사례 보기",en:"Cases"},
cases_desc:{ko:"구조의 변화가 만드는 현실의 차이",en:"How structural change transforms reality"},

research_title:{ko:"연구 참여",en:"Research"},
research_desc:{ko:"함께 구조를 탐구하고 확장합니다",en:"Explore and expand structure together"},

c_philosophy:{ko:"철학",en:"Philosophy"},
c_society:{ko:"사회",en:"Society"},
c_economy:{ko:"경제",en:"Economy"},
c_education:{ko:"교육",en:"Education"}
};

function setLang(lang){
localStorage.setItem("lang",lang);

document.querySelectorAll("[data-i18n]").forEach(el=>{
if(content[el.dataset.i18n]){
el.innerHTML=content[el.dataset.i18n][lang];
}
});

document.getElementById("page-title").innerText =
lang==="ko" ? "온포럼 | ON-FORUM" : "ON-FORUM";

document.getElementById("btn-ko").classList.toggle("active",lang==="ko");
document.getElementById("btn-en").classList.toggle("active",lang==="en");
}

window.onload=function(){
setLang(localStorage.getItem("lang")||"ko");
}
</script>

</body>
</html>
