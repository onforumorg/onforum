<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ON-FORUM</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>

<style>
/* (CSS 전부 그대로 유지) */
body{
  font-family:'Pretendard',sans-serif;
  margin:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(181,148,93,0.08), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(26,42,64,0.06), transparent 40%),
    linear-gradient(to bottom,#f7f6f2,#f2efe8);
}

.container{max-width:1100px;margin:0 auto;padding:40px 20px;}
.center{text-align:center;}

.hero{padding:80px 20px 60px;}
.hero-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:40px;
  max-width:1100px;
  margin:0 auto;
}
.hero-left{flex:1;}
.hero-right{flex:1;display:flex;flex-direction:column;align-items:center;}

.hero-title{
  font-size:3.5rem;
  font-weight:900;
  letter-spacing:6px;
  background:linear-gradient(to right,#444,#bbb,#444);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:20px;
}

.main-text{font-size:1.4rem;font-weight:600;color:#222;margin-bottom:10px;}
.sub-text{font-size:1.4rem;font-weight:600;color:#222;margin-bottom:30px;line-height:1.6;}

.menu a{
  display:inline-block;
  margin:5px;
  padding:12px 22px;
  border-radius:10px;
  border:1px solid rgba(26,42,64,0.2);
  background:rgba(255,255,255,0.7);
  color:#1a2a40;
  font-weight:700;
  text-decoration:none;
  transition:0.25s;
}
.menu a:hover{
  background:#1a2a40;
  color:#fff;
}

.concept-box{
  background:rgba(255,255,255,0.7);
  padding:20px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  font-weight:700;
  line-height:1.8;
  text-align:left;
  margin-top:0;
}

.bottom-band{
  margin-top:40px;
  padding:35px 20px;
  background:#4b5320;
  color:#fff;
  text-align:center;
  font-weight:700;
  font-size:1.4rem;
}

.preview-wrap{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}
.preview-card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  width:260px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  text-decoration:none;
  color:inherit;
  transition:0.25s;
}
.preview-card:hover{
  transform:translateY(-5px);
}
.preview-card span{
  display:block;
  margin-top:10px;
  font-weight:700;
  color:#b5945d;
}

.logo-container{margin-top:10px;}
.logo-row{display:flex;align-items:center;gap:20px;}

@media(max-width:768px){
  .hero-inner{flex-direction:column;}
  .hero-left{text-align:center;}
}
</style>
</head>

<body>

<div style="text-align:right;padding:15px;">
<button onclick="setLang('ko')">KOR</button>
<button onclick="setLang('en')">ENG</button>
</div>

<section class="hero">
<div class="hero-inner">

<div class="menu">
<a href="#intro" data-i18n="btn_intro"></a>

<a href="cases.html" data-i18n="btn_cases"></a>
<a href="#research" data-i18n="btn_research"></a>
</div>
</div>

<div class="hero-right">
<div class="logo-row">

<div class="logo-container">
  <svg width="200" height="240" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
    <circle cx="100" cy="100" r="80" stroke="black" stroke-width="10" fill="none"/>
    <circle cx="100" cy="100" r="20" fill="black"/>
    <path d="M100 145 L45 225 L155 225 Z" stroke="black" stroke-width="8" fill="none"/>
  </svg>
</div>

<div class="concept-box">
  <p data-i18n="c_philosophy"></p>
  <p data-i18n="c_society"></p>
  <p data-i18n="c_economy"></p>
  <p data-i18n="c_education"></p>
</div>

</div>
</div>

</div>
</section>

<div class="bottom-band" data-i18n="definition"></div>

<section class="container center">

<div class="preview-wrap">

<a href="cases.html#case-1" class="preview-card">

</a>
</div>
</section>

<div style="max-width:1100px; margin:0 auto; padding:60px 20px;">
<div style="display:flex; flex-wrap:wrap; justify-content:space-between; gap:40px;">
<div style="flex:1; min-width:260px;">
<h2 style="margin-bottom:20px; font-size:1.6rem;">ON-FORUM</h2>
<p style="line-height:1.8; color:#cfd6df;" data-i18n="footer_desc"></p>
</div>
<div style="flex:1; min-width:260px;">

<div style="line-height:2; font-weight:600;">
<div>📞 0505-799-7878</div>
<div>📧 onforum.org@gmail.com</div>
<div>🌐 https://on-forum.org/</div>
</div>
</div>

<div style="border-top:1px solid rgba(255,255,255,0.15); margin-top:40px; padding-top:20px; text-align:center; font-size:0.9rem; color:#aaa;">

<script>
const content = {
  hero: {

    ko: "<span style='font-size: 0.95em;'>온포럼(ON-FORUM)은 세상을 해석하는 기준을 제시합니다.</span>",

  btn_intro:{ko:"소개",en:"Intro"},

  c_philosophy:{ko:"철학",en:"Philosophy"},
  c_society:{ko:"사회",en:"Society"},

function setLang(lang){
  localStorage.setItem("lang",lang);
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    if(content[el.dataset.i18n]) {
      el.innerHTML = content[el.dataset.i18n][lang];
    }
  });
}

window.onload=function(){
  setLang(localStorage.getItem("lang") || "ko");
}
