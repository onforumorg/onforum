<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ON-FORUM</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>

<style>
body{
  font-family:'Pretendard',sans-serif;
  margin:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(181,148,93,0.08), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(26,42,64,0.06), transparent 40%),
    linear-gradient(to bottom,#f7f6f2,#f2efe8);
}

.container{max-width:1000px;margin:auto;padding:40px 20px;}
.center{text-align:center;}

/* 언어 버튼 */
.lang-switch{position:fixed;top:20px;right:30px;}
.lang-btn{border:none;background:none;font-weight:bold;cursor:pointer;}
.lang-btn.active{border-bottom:2px solid #000;}

/* HERO */
.hero{text-align:center;padding:100px 20px 60px;}

/* 로고 (복구) */
.hero-title{
  font-size:4.2rem;
  font-weight:900;
  letter-spacing:14px;
  background:linear-gradient(90deg,#1a2a40,#aaa,#1a2a40);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:30px;
}

/* 핵심 문장 */
.main-text{
  font-size:1.5rem;
  font-weight:600;
  color:#222;
}

.sub-text{
  font-size:1.2rem;
  font-weight:700;
  margin-bottom:50px;
}

/* 버튼 (복구형) */
.menu{margin-top:30px;margin-bottom:70px;}
.menu a{
  display:inline-block;
  margin:0 10px;
  padding:12px 26px;
  border-radius:10px;
  border:1px solid rgba(26,42,64,0.2);
  background:rgba(255,255,255,0.7);
  color:#1a2a40;
  font-weight:700;
  text-decoration:none;
  transition:0.25s;
}
.menu a:hover{
  background:#1a2a40;
  color:#fff;
}

/* 질문 */
.question h2{
  font-size:1.9rem;
  margin-bottom:15px;
}
.question p{
  font-size:1.15rem;
  margin:6px 0;
}
.question strong{
  font-size:1.25rem;
}

/* 🔶 핵심 띠 */
.bottom-band{
  margin-top:80px;
  padding:40px 20px;
  background-color:#4b5320;
  color:#fff;
  text-align:center;
  font-size:1.3rem;
  font-weight:700;
  letter-spacing:0.6px;
}

/* FOOTER */
.footer{
  margin-top:120px;
  padding:60px 20px 40px;
  background:linear-gradient(to top,#f0ede6,transparent);
}
.footer-inner{
  max-width:900px;margin:auto;
  display:flex;justify-content:space-between;flex-wrap:wrap;
}
.footer-brand,.footer-contact,.footer-copy{flex:1;min-width:200px;}
.footer-brand{text-align:left;}
.footer-contact{text-align:center;}
.footer-copy{text-align:right;}

@media(max-width:768px){
  .footer-inner{flex-direction:column;text-align:center;}
}

.onforum-logo-container {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 300px;
    height: 300px;
    position: relative;
}

.circle-outer {
    width: 200px;
    height: 200px;
    border: 2px solid #333;
    border-radius: 50%;
    position: absolute;
    display: flex;
    justify-content: center;
    align-items: center;
}

.triangle-inner {
    width: 0;
    height: 0;
    border-left: 60px solid transparent;
    border-right: 60px solid transparent;
    border-bottom: 104px solid #333;
    position: absolute;
    bottom: 48px;
}

.center-dot {
    width: 12px;
    height: 12px;
    background-color: #ff0000;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -10%);
    z-index: 10;
}
  
</style>
</head>

<body>

<!-- 언어 -->
<nav class="lang-switch">
<button id="btn-ko" class="lang-btn" onclick="setLang('ko')">KOR</button>
<button id="btn-en" class="lang-btn" onclick="setLang('en')">ENG</button>
</nav>

<div class="container">

<div class="onforum-logo-container">
    <div class="circle-outer">
        <div class="triangle-inner"></div>
        <div class="center-dot"></div>
    </div>
</div>
  
<section class="hero">

<h1 class="hero-title">ON-FORUM</h1>

<p class="main-text" data-i18n="hero">복잡한 현실을 구조로 해석하는 인식 시스템</p>
<p class="sub-text" data-i18n="hero_sub">문제는 정보가 아니라 구조입니다</p>

<div class="menu">
<a href="#" data-i18n="btn_intro">소개</a>
<a href="#" data-i18n="btn_cases">사례</a>
<a href="#" data-i18n="btn_research">연구</a>
<a href="#" data-i18n="btn_contact">참여</a>
</div>

<div class="question">
<h2>우리는 왜 같은 문제를 반복할까요?</h2>
<p>정보는 충분합니다.</p>
<p><strong>그러나 기준은 없습니다.</strong></p>
</div>

<div class="bottom-band" data-i18n="definition">
온포럼은 현실을 구조로 분석하는 연구 플랫폼입니다
</div>

</section>

</div>

<!-- footer -->
<footer class="footer">
<div class="footer-inner">

<div class="footer-brand">
<strong>ON-FORUM</strong>
<p>현실을 구조로 분석하는 연구 플랫폼</p>
</div>

<div class="footer-contact">
<p>📞 0505-799-7878</p>
<p>✉️ onforum.org@gmail.com</p>
<p>🌐 https://on-forum.org/</p>
</div>

<div class="footer-copy">
© 2026 ON-FORUM. All rights reserved.
</div>

</div>
</footer>

<script>
const content={
hero:{ko:"복잡한 현실을 구조로 해석하는 인식 시스템",en:"A system that interprets reality through structure"},
hero_sub:{ko:"문제는 정보가 아니라 구조입니다",en:"The problem is not information, but structure"},
definition:{ko:"온포럼은 현실을 구조로 분석하는 연구 플랫폼입니다",en:"A platform that analyzes reality through structure"},
btn_intro:{ko:"소개",en:"Intro"},
btn_cases:{ko:"사례",en:"Cases"},
btn_research:{ko:"연구",en:"Research"},
btn_contact:{ko:"참여",en:"Contact"}
};

function setLang(lang){
localStorage.setItem("lang",lang);
document.querySelectorAll("[data-i18n]").forEach(el=>{
el.innerHTML=content[el.dataset.i18n][lang];
});
document.getElementById("btn-ko").classList.toggle("active",lang==="ko");
document.getElementById("btn-en").classList.toggle("active",lang==="en");
}

window.onload=function(){
setLang(localStorage.getItem("lang")||"ko");
}
</script>

</body>
</html>
