<style>
body{
  font-family:'Pretendard',sans-serif;
  margin:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(181,148,93,0.08), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(26,42,64,0.06), transparent 40%),
    linear-gradient(to bottom,#f7f6f2,#f2efe8);
}

.container{max-width:1100px;margin:0 auto;padding:40px 20px;}
.center{text-align:center;}

.hero{
  padding:110px 40px 90px;
}

.hero-inner{
  display:flex;
  align-items:center;
  gap:90px;
  max-width:1450px;
  margin:0 auto;
}

.hero-left{
  flex:0 0 240px;
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:-35px;
  position:relative;
}

.hero-right{
  flex:1;
  max-width:950px;
}

.hero-title{
  font-size:5rem;
  font-weight:900;
  letter-spacing:3px;
  line-height:1;
  background:linear-gradient(to right,#2a2a2a,#b9b9b9,#2a2a2a);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:38px;
}

.main-text{
  font-size:1.8rem;
  font-weight:700;
  color:#1f1f1f;
  line-height:1.8;
  margin-bottom:28px;
}

.sub-text{
  font-size:1.55rem;
  font-weight:500;
  color:#2f2f2f;
  line-height:2;
  margin-bottom:55px;
}

.sub-text strong{
  font-size:1.05em;
  font-weight:900;
  color:#111;
}

.menu{
  display:grid;
  grid-template-columns:repeat(2, minmax(220px, 320px));
  gap:22px;
}

.menu a{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:82px;
  padding:18px 28px;

  border-radius:18px;
  border:1px solid rgba(255,255,255,0.35);

  background:
    linear-gradient(
      to bottom,
      rgba(255,255,255,0.92),
      rgba(245,244,240,0.72)
    );

  font-weight:800;
  text-decoration:none;

  font-size:1.18rem;
  letter-spacing:1px;

  background-clip:padding-box;

  color:transparent;
  background-image:
    linear-gradient(to right,#1a2a40,#6f7d94,#1a2a40),
    linear-gradient(
      to bottom,
      rgba(255,255,255,0.92),
      rgba(245,244,240,0.72)
    );

  -webkit-background-clip:text, padding-box;
  background-clip:text, padding-box;

  box-shadow:
    0 10px 25px rgba(0,0,0,0.04),
    inset 0 1px 0 rgba(255,255,255,0.65);

  backdrop-filter:blur(8px);

  transition:
    transform 0.28s,
    box-shadow 0.28s,
    background 0.28s;
}

.menu a:hover{

  transform:translateY(-4px);

  background:#1a2a40;

  color:#ffffff;
  -webkit-text-fill-color:#ffffff;

  box-shadow:
    0 16px 30px rgba(0,0,0,0.12),
    0 0 18px rgba(26,42,64,0.18);

  border:1px solid rgba(255,255,255,0.18);
}

.bottom-band{
  margin-top:40px;
  padding:35px 20px;
  background:#4b5320;
  color:#fff;
  text-align:center;
  font-weight:700;
  font-size:1.4rem;
}

.preview-wrap{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.preview-card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  width:260px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  text-decoration:none;
  color:inherit;
  transition:0.25s;
}

.preview-card:hover{
  transform:translateY(-5px);
}

.preview-card span{
  display:block;
  margin-top:15px;
  font-weight:700;
  color:#b5945d;
}

.logo-container{
  margin-top:-12px;
}

.ambient-flow{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}

.ambient-flow::before{
  content:"";
  position:absolute;

  width:900px;
  height:900px;

  left:-180px;
  top:-220px;

  border-radius:50%;

  background:
    radial-gradient(
      circle,
      rgba(120,135,95,0.06) 0%,
      rgba(120,135,95,0.03) 28%,
      transparent 68%
    );

  filter:blur(18px);
}

.ambient-flow::after{
  content:"";
  position:absolute;

  width:700px;
  height:700px;

  right:-120px;
  bottom:-180px;

  border-radius:50%;

  background:
    radial-gradient(
      circle,
      rgba(181,148,93,0.07) 0%,
      rgba(181,148,93,0.025) 35%,
      transparent 72%
    );

  filter:blur(22px);
}

.hero{
  position:relative;
  z-index:1;
}

.hero-left{
  position:relative;
}

.hero-left::after{
  content:"";
  position:absolute;

  width:420px;
  height:420px;

  border-radius:50%;

  border:1px solid rgba(120,130,150,0.08);

  left:50%;
  top:50%;

  transform:
    translate(-52%,-60%)
    rotate(-12deg);

  pointer-events:none;
}

.hero-left::before{
  content:"";
  position:absolute;

  width:320px;
  height:320px;

  border-radius:50%;

  border:1px solid rgba(181,148,93,0.06);

  left:50%;
  top:50%;

  transform:
    translate(-48%,-56%)
    rotate(8deg);

  pointer-events:none;
}
    
@media(max-width:900px){

  .hero{
    padding:80px 24px 70px;
  }

  .hero-inner{
    flex-direction:column;
    text-align:center;
    gap:45px;
  }

  .hero-left{
    flex:none;
  }

  .hero-title{
    font-size:3.5rem;
  }

  .main-text{
    font-size:1.35rem;
  }

  .sub-text{
    font-size:1.18rem;
  }

  .menu{
    grid-template-columns:1fr;
    justify-items:center;
  }

  .menu a{
    width:100%;
    max-width:420px;
  }
}
</style>
