<style>
    :root {
        /* 배경을 눈이 편안한 미색으로 변경 */
        --bg-color: #fbfbfb; 
        --text-main: #111;
        --accent-red: #b22222; /* 인장 고유의 붉은색 포인트 */
    }

    body {
        background-color: var(--bg-color);
        /* 미세한 질감을 주는 배경 효과 추가 */
        background-image: url("https://www.transparenttextures.com/patterns/white-paper.png");
        -webkit-font-smoothing: antialiased;
    }

    /* 헤더 영역: 로고와 인장의 공진 배치 */
    header {
        position: relative;
        padding: 100px 0 60px 0;
        text-align: center;
    }

    .logo-container {
        display: inline-block;
        position: relative;
    }

    .logo-text {
        font-size: 2.8rem;
        font-weight: 900;
        letter-spacing: 8px;
        color: #000;
        position: relative;
        z-index: 2;
    }

    /* 인장을 로고와 자연스럽게 어우러지게 배치 (낙관 스타일) */
    .seal-img {
        position: absolute;
        top: -30px;
        right: -50px;
        width: 80px;
        height: auto;
        opacity: 0.8;
        z-index: 1;
        transform: rotate(5deg);
        filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1));
    }

    /* 나머지 섹션 디자인 정교화 */
    section {
        background: rgba(255, 255, 255, 0.5); /* 섹션 배경에 은은한 투명도 부여 */
        padding: 40px;
        border-radius: 2px;
        margin-bottom: 80px;
    }
</style>
