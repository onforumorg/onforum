<!DOCTYPE html>
<html lang="ko">
<head>
    <meta name="google-site-verification" content="AO04JIbwmCmGyniRJkDQeEBEXviPYXGTGirNbMCza5o" />
    <meta name="naver-site-verification" content="6a4d77a14577fabfd17f8811ce5e9f59ff77ca10" /> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ON-FORUM | 온포럼</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-paper: #f7f6f2; 
            --point-gold: #b5945d; 
            --deep-blue: #1a2a40; 
            --text-main: #1a1a1a;
            --transition: all 0.6s cubic-bezier(0.2, 1, 0.3, 1);
        }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-paper); color: var(--text-main); margin: 0; padding: 0; line-height: 1.7; -webkit-font-smoothing: antialiased; word-break: keep-all; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shine { 
            0% { text-shadow: 0 0 5px rgba(181, 148, 93, 0.1); color: rgba(26, 42, 64, 0.1); } 
            50% { text-shadow: 0 0 20px rgba(181, 148, 93, 0.3); color: rgba(26, 42, 64, 0.4); } 
            100% { text-shadow: 0 0 5px rgba(181, 148, 93, 0.1); color: rgba(26, 42, 64, 0.1); } 
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 40px; }

        /* 언어 스위치 */
        .lang-en { display: none; }
        .lang-switch { position: fixed; top: 30px; right: 40px; z-index: 1000; display: flex; gap: 12px; }
        .lang-btn { background: none; border: none; font-size: 11px; letter-spacing: 2px; color: #ccc; cursor: pointer; font-weight: 800; transition: 0.3s; }
        .lang-btn.active { color: var(--deep-blue); border-bottom: 2px solid var(--deep-blue); }

        header { text-align: center; padding: 80px 0 60px; animation: fadeIn 1s ease-out; }
        .main-title { 
            font-size: 3.8rem; font-weight: 900; letter-spacing: 15px; margin: 0;
            color: transparent; -webkit-text-stroke: 1.2px var(--deep-blue); 
            animation: shine 4s infinite ease-in-out;
        }

        /* 1. 메인 히어로 영역 */
        .hero-section { text-align: center; margin-bottom: 100px; }
        .hero-title { font-size: 2.2rem; font-weight: 800; line-height: 1.4; color: var(--deep-blue); }
        .hero-sub { font-size: 1.1rem; color: #666; margin-top: 25px; }
        .btn-group { display: flex; justify-content: center; gap: 15px; margin-top: 40px; }
        .btn { padding: 12px 25px; text-decoration: none; border-radius: 4px; font-weight: 600; font-size: 0.9rem; transition: 0.3s; letter-spacing: 1px; }
        .btn-primary { background: var(--deep-blue); color: white; }
        .btn-outline { border: 1px solid var(--deep-blue); color: var(--deep-blue); }

        /* 2. 한 줄 정의 영역 */
        .definition-bar { background: var(--deep-blue); color: #fff; padding: 50px 0; text-align: center; margin: 80px 0; }
        .definition-bar h2 { font-size: 1.5rem; font-weight: 300; margin: 0; letter-spacing: 2px; color: #fff; }

        /* 섹션 공통 스타일 */
        section { margin-bottom: 120px; animation: fadeIn 1.2s ease-out; }
        .section-tag { font-size: 0.75rem; letter-spacing: 4px; color: var(--point-gold); font-weight: 800; margin-bottom: 15px; display: block; }
        h3 { font-size: 2rem; font-weight: 900; margin-bottom: 50px; color: var(--deep-blue); }

        /* 3. 우리가 하는 일 (4블록) & 5. 적용 사례 (3블록) */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 30px; }
        .card { background: #fff; padding: 40px 30px; border-left: 4px solid var(--point-gold); box-shadow: 0 10px 30px rgba(0,0,0,0.03); transition: var(--transition); }
        .card:hover { transform: translateY(-10px); border-left-width: 10px; }
        .card-title { font-size: 1.3rem; font-weight: 800; color: var(--deep-blue); margin-bottom: 15px; display: block; }
        .card-desc { font-size: 1rem; color: #555; line-height: 1.6; }

        /* 4. 왜 필요한가 */
        .why-box { background: rgba(181, 148, 93, 0.05); padding: 60px 40px; text-align: center; border: 1px solid rgba(181, 148, 93, 0.2); }
        .why-text { font-size: 1.2rem; color: #444; max-width: 700px; margin: 0 auto; }

        /* 6. 핵심 개념 (Flow, Resonance, Structure) */
        .concept-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; text-align: center; margin-top: 40px; }
        .concept-item h4 { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; color: var(--point-gold); margin-bottom: 10px; }
        .concept-item p { font-size: 0.95rem; color: #777; }

        /* 7. 마무리 CTA */
        .cta-area { text-align: center; padding: 100px 0; border-top: 1px solid #ddd; margin-top: 100px; }
        .cta-title { font-size: 1.8rem; font-weight: 800; color: var(--deep-blue); margin-bottom: 40px; }

        footer { padding: 60px 0; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: flex-start; }
        .contact-link { font-size: 0.95rem; font-weight: 700; color: var(--deep-blue); text-decoration: none; display: block; margin-bottom: 8px; }
        .footer-right { text-align: right; color: #888; font-size: 0.85rem; }

        @media (max-width: 768px) {
            .main-title { font-size: 2.5rem; letter-spacing: 8px; }
            .card-grid { grid-template-columns: 1fr; }
            .concept-grid { grid-template-columns: 1fr; }
            footer { flex-direction: column; gap: 30px; text-align: center; }
            .footer-right { text-align: center; width: 100%; }
        }
    </style>
</head>
<body>

    <nav class="lang-switch">
        <button class="lang-btn active" onclick="setLang('ko')">KOR</button>
        <button class="lang-btn" onclick="setLang('en')">ENG</button>
    </nav>

    <div class="container">
        <header>
