<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ON-FORUM</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>

<style>
body{
  font-family:'Pretendard',sans-serif;
  margin:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(181,148,93,0.08), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(26,42,64,0.06), transparent 40%),
    linear-gradient(to bottom,#f7f6f2,#f2efe8);
}

.container{max-width:1100px;margin:0 auto;padding:40px 20px;}
.center{text-align:center;}

.hero{padding:80px 20px 60px;}
.hero-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:40px;
  max-width:1100px;
  margin:0 auto;
}
.hero-left{flex:1;}
.hero-right{flex:1;display:flex;flex-direction:column;align-items:center;}

.hero-title{
  font-size:3.5rem;
  font-weight:900;
  letter-spacing:6px;
  background:linear-gradient(to right,#444,#bbb,#444);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:20px;
}

.main-text{font-size:1.4rem;font-weight:600;color:#222;margin-bottom:10px;}
.sub-text{font-size:1.1rem;font-weight:700;margin-bottom:30px;}

.menu a{
  display:inline-block;
  margin:5px;
  padding:12px 22px;
  border-radius:10px;
  border:1px solid rgba(26,42,64,0.2);
  background:rgba(255,255,255,0.7);
  color:#1a2a40;
  font-weight:700;
  text-decoration:none;
  transition:0.25s;
}
.menu a:hover{
  background:#1a2a40;
  color:#fff;
}

.concept-box{
  background:rgba(255,255,255,0.7);
  padding:25px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  font-weight:700;
  line-height:1.8;
  text-align:center;
  margin-top:20px;
}

.bottom-band{
  margin-top:40px;
  padding:30px 20px;
  background:#4b5320;
  color:#fff;
  text-align:center;
  font-weight:700;
}

.preview-wrap{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}
.preview-card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  width:260px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  text-decoration:none;
  color:inherit;
  transition:0.25s;
}
.preview-card:hover{
  transform:translateY(-5px);
}
.preview-card span{
  display:block;
  margin-top:10px;
  font-weight:700;
  color:#b5945d;
}

.logo-container{
  margin-top:10px;
}

/* --- 비선형적 안개 마스크 애니메이션 --- */
.mask-dot { mask: url(#m-dot); }
.mask-circle { mask: url(#m-circle); }
.mask-tri { mask: url(#m-tri); }

@media(max-width:768px){
  .hero-inner{flex-direction:column;}
  .hero-left{text-align:center;}
}
</style>
</head>

<body>

<div style="text-align:right;padding:15px;">
<button onclick="setLang('ko')">KOR</button>
<button onclick="setLang('en')">ENG</button>
</div>

<section class="hero">
<div class="hero-inner">

<div class="hero-left">
<h1 class="hero-title">ON-FORUM</h1>

<p class="main-text" data-i18n="hero"></p>
<p class="sub-text" data-i18n="hero_sub"></p>

<div class="menu">
<a href="#intro" data-i18n="btn_intro"></a>
<a href="#structure" data-i18n="btn_structure"></a>
<a href="cases.html" data-i18n="btn_cases"></a>
<a href="#research" data-i18n="btn_research"></a>
</div>
</div>

<div class="hero-right">

<div class="logo-container">
<svg width="200" height="220" viewBox="0 0 200 240">
  <defs>
    <mask id="m-circle">
      <radialGradient id="g-circle" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="white">
          <animate attributeName="offset" dur="7s" values="0%;100%;0%" repeatCount="indefinite" />
        </stop>
        <stop offset="100%" stop-color="black">
          <animate attributeName="offset" dur="11s" values="100%;0%;100%" repeatCount="indefinite" />
        </stop>
      </radialGradient>
      <circle cx="100" cy="100" r="100" fill="url(#g-circle)" />
    </mask>

    <mask id="m-dot">
      <radialGradient id="g-dot" cx="30%" cy="30%" r="50%">
        <stop offset="0%" stop-color="white">
          <animate attributeName="offset" dur="5s" values="0%;80%;0%" repeatCount="indefinite" />
        </stop>
        <stop offset="100%" stop-color="black">
          <animate attributeName="offset" dur="9s" values="100%;20%;100%" repeatCount="indefinite" />
        </stop>
      </radialGradient>
      <rect x="0" y="0" width="200" height="240" fill="url(#g-dot)" />
    </mask>

    <mask id="m-tri">
      <linearGradient id="g-tri" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="black">
          <animate attributeName="offset" dur="13s" values="0%;100%;0%" repeatCount="indefinite" />
        </stop>
        <stop offset="50%" stop-color="white">
          <animate attributeName="offset" dur="8s" values="20%;80%;20%" repeatCount="indefinite" />
        </stop>
        <stop offset="100%" stop-color="black">
          <animate attributeName="offset" dur="15s" values="100%;0%;100%" repeatCount="indefinite" />
        </stop>
      </linearGradient>
      <rect x="0" y="0" width="200" height="240" fill="url(#g-tri)" />
    </mask>

    <filter id="blur-filter">
      <feGaussianBlur stdDeviation="1.5">
        <animate attributeName="stdDeviation" dur="6s" values="0;3;0.5;4;0" repeatCount="indefinite" />
      </feGaussianBlur>
    </filter>
  </defs>

  <g filter="url(#blur-filter)">
    <circle class="mask-circle" cx="100" cy="100" r="80" stroke="black" stroke-width="10" fill="none"/>
    <circle class="mask-dot" cx="100" cy="100" r="20" fill="black"/>
    <path class="mask-tri" d="M100 145 L45 225 L155 225 Z" stroke="black" stroke-width="8" fill="none"/>
  </g>
</svg>
</div>

<div class="concept-box">
<p data-i18n="c_philosophy"></p>
<p data-i18n="c_society"></p>
<p data-i18n="c_economy"></p>
<p data-i18n="c_education"></p>
</div>

</div>
</div>
</section>

<div class="bottom-band" data-i18n="definition"></div>

<section class="container center">
<h2 data-i18n="cases_title"></h2>

<div class="preview-wrap">
<a href="cases.html#case-0" class="preview-card">
<h3 data-i18n="case1_title"></h3>
<p data-i18n="case1_desc"></p>
<span data-i18n="case1_result"></span>
</a>

<a href="cases.html#case-1" class="preview-card">
<h3 data-i18n="case2_title"></h3>
<p data-i18n="case2_desc"></p>
<span data-i18n="case2_result"></span>
</a>
</div>

<section id="research" style="background:#1a2a40; color:#fff; margin-top:60px;">

<div style="max-width:1100px; margin:0 auto; padding:60px 20px;">

<div style="display:flex; flex-wrap:wrap; justify-content:space-between; gap:40px;">

<div style="flex:1; min-width:260px;">
<h2 style="margin-bottom:20px; font-size:1.6rem;">ON-FORUM</h2>
<p style="line-height:1.8; color:#cfd6df;" data-i18n="footer_desc"></p>
</div>

<div style="flex:1; min-width:260px;">
<h3 style="margin-bottom:20px;">Contact</h3>

<div style="line-height:2; font-weight:600;">
<div>📞 0505-799-7878</div>
<div>📧 onforum.org@gmail.com</div>
<div>🌐 https://on-forum.org/</div>
</div>

</div>

</div>

<div style="border-top:1px solid rgba(255,255,255,0.15); margin-top:40px; padding-top:20px; text-align:center; font-size:0.9rem; color:#aaa;">
© ON-FORUM. All rights reserved.
</div>

</div>

</section>

<script>
const content={
hero:{ko:"세상을 해석하는 기준을 다시 설계합니다",en:"Redefining how we interpret reality"},
hero_sub:{ko:"문제는 정보가 아니라 구조입니다",en:"The problem is structure, not information"},
definition:{ko:"온포럼은 현실을 구조로 분석하는 연구 플랫폼입니다",en:"A platform analyzing reality through structure"},

btn_intro:{ko:"소개",en:"Intro"},
btn_structure:{ko:"구조 보기",en:"Structure"},
btn_cases:{ko:"사례 보기",en:"Cases"},
btn_research:{ko:"연구 참여",en:"Research"},

c_philosophy:{ko:"철학",en:"Philosophy"},
c_society:{ko:"사회",en:"Society"},
c_economy:{ko:"경제",en:"Economy"},
c_education:{ko:"교육",en:"Education"},

cases_title:{ko:"적용 사례",en:"Use Cases"},

case1_title:{ko:"판단 오류 반복",en:"Repeated Misjudgment"},
case1_desc:{ko:"정보 부족이 아닌 기준 구조 문제",en:"Not lack of information, but structural criteria issue"},
case1_result:{ko:"→ 구조가 기준이 된다",en:"→ Structure becomes the standard"},

case2_title:{ko:"조직 갈등 반복",en:"Repeated Organizational Conflict"},
case2_desc:{ko:"사람이 아닌 구조 비대칭 문제",en:"Not people, but structural asymmetry"},
case2_result:{ko:"→ 구조 수정으로 해결",en:"→ Solved through structural change"},

footer_desc:{
ko:"온포럼은 현실을 구조로 해석하고 재설계하는 연구 플랫폼입니다.<br>정보가 아닌 기준을 통해, 반복되는 문제를 구조적으로 해결합니다.",
en:"ON-FORUM is a research platform that interprets and redesigns reality through structure.<br>It solves recurring problems structurally through standards, not information."
}
};

function setLang(lang){
localStorage.setItem("lang",lang);
document.querySelectorAll("[data-i18n]").forEach(el=>{
el.innerHTML=content[el.dataset.i18n][lang];
});
}

window.onload=function(){
setLang(localStorage.getItem("lang")||"ko");
}
</script>

</body>
</html>
