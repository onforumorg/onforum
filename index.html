<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ON-FORUM | 온포럼</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-paper: #f7f6f2;
    --point-gold: #b5945d;
    --deep-blue: #1a2a40;
    --text-main: #1a1a1a;
}
body {
    font-family: 'Pretendard', sans-serif;
    background-color: var(--bg-paper);
    margin: 0;
    padding: 0;
    line-height: 1.7;
}
.container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 40px;
}
.lang-switch {
    position: fixed;
    top: 30px;
    right: 40px;
}
.lang-btn {
    border: none;
    background: none;
    font-weight: bold;
    cursor: pointer;
    margin-left: 10px;
}
.lang-btn.active {
    border-bottom: 2px solid #000;
}
.main-title {
    text-align: center;
    font-size: 3rem;
    margin-top: 60px;
}
.hero {
    text-align: center;
    margin-top: 40px;
}
.btn-group {
    margin-top: 30px;
}
.btn {
    padding: 10px 20px;
    text-decoration: none;
    margin: 5px;
    border: 1px solid #000;
}
</style>
</head>

<body>

<nav class="lang-switch">
    <button class="lang-btn" id="btn-ko" onclick="setLang('ko')">KOR</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">ENG</button>
</nav>

<h1 class="main-title">ON-FORUM</h1>

<div class="container">
    <div class="hero">
        <h2 data-i18n="hero_title"></h2>
        <p data-i18n="hero_sub"></p>

        <div class="btn-group">
            <a href="intro.html" class="btn" data-i18n="btn_intro"></a>
            <a href="cases.html" class="btn" data-i18n="btn_cases"></a>
            <a href="research.html" class="btn" data-i18n="btn_research"></a>
            <a href="contact.html" class="btn" data-i18n="btn_contact"></a>
        </div>
    </div>
</div>

<script>
const content = {
    hero_title: {
        ko: "복잡한 현실을 구조로 해석하는 새로운 인식 시스템",
        en: "A New Cognitive System for Interpreting Reality Through Structure"
    },
    hero_sub: {
        ko: "현실의 문제는 구조로 이해될 때 해결됩니다.",
        en: "Problems are solved when understood through structure."
    },
    btn_intro: {
        ko: "온포럼 소개",
        en: "About Us"
    },
    btn_cases: {
        ko: "적용 사례",
        en: "Case Studies"
    },
    btn_research: {
        ko: "연구 보기",
        en: "Research"
    },
    btn_contact: {
        ko: "문의",
        en: "Contact"
    }
};

function setLang(lang) {
    localStorage.setItem("lang", lang);

    document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.dataset.i18n;
        el.innerText = content[key][lang];
    });

    document.getElementById("btn-ko").classList.toggle("active", lang === "ko");
    document.getElementById("btn-en").classList.toggle("active", lang === "en");
}

window.onload = function() {
    const lang = localStorage.getItem("lang") || "ko";
    setLang(lang);
};
</script>

</body>
</html>
