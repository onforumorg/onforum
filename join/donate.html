<style>

body {

  margin:0;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 30%, rgba(181,148,93,0.08), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(26,42,64,0.05), transparent 40%),
    var(--bg-main);
}

.container{
  max-width:900px;
  margin:auto;
  padding:60px 20px;
}

  .container{

  padding:60px 20px;
}

.lang-switch{
    position:relative;
    z-index:9999;
    text-align:right;
    padding:15px;
}

.lang-switch button{
    padding:10px 18px;
    margin-left:8px;

    z-index:9999;

</style>
  
</style>

</head>

<body>

<div class="lang-switch" style="text-align:right;padding:15px;">

data-i18n="intro">

<div style="display:flex; gap:30px; flex-wrap:wrap; margin-top:20px;">

      일시후원하기 →
    </a>
  </div>

  <div style="flex:1; min-width:280px; background:#fff; border-radius:16px; padding:40px; box-shadow:0 15px 40px rgba(0,0,0,0.05);">

    정기후원하기 →
</a>
  </div>

</div>
<div style="text-align:center; margin-top:70px;">

  <p style="font-size:1.08rem; line-height:2; max-width:700px; margin:0 auto;">

     style="display:inline-block; margin-top:30px; color:var(--deep-blue); text-decoration:none; font-weight:600;">

  </a>

</div>  
</div>

<script>
const content = {

title:{
    ko:"공진후원",
    en:"Resonance Support"
},

intro:{
    ko:"당신의 후원은<br>온포럼의 연구와 기록,<br>그리고 다음 세대의 질문을 이어갑니다.",
    en:"Your support sustains ON-FORUM's research, records, and the questions of future generations."
}

};

function setLang(lang){

    localStorage.setItem("lang",lang);

    document.documentElement.lang = lang;

    document.querySelector("[data-i18n='title']").innerHTML = content.title[lang];

    document.querySelector("[data-i18n='intro']").innerHTML = content.intro[lang];

}

window.onload=function(){

    setLang(localStorage.getItem("lang") || "ko");

}
</script>
